<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>御請求書</title>
<style>
  :root {
    --ink:   #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #909090;
    --line:  #d0cdc6;
    --line-dark: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #e8e6e0;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic Medium", sans-serif;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
  }

  /* ===== SCREEN BAR ===== */
  .screen-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--ink);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    font-size: 12px;
    gap: 12px;
  }
  .screen-bar a { color: #aaa; text-decoration: none; font-size: 12px; }
  .screen-bar a:hover { color: white; }
  .screen-bar .actions { display: flex; gap: 8px; }
  .screen-bar button {
    padding: 5px 14px;
    border: 1px solid #555;
    background: transparent;
    color: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }
  .screen-bar button.primary {
    background: white;
    color: var(--ink);
    border-color: white;
    font-weight: 600;
  }
  .screen-bar button:hover:not(.primary):not(:disabled) { border-color: white; }
  .screen-bar button.issued {
    background: #4a9e6e;
    color: white;
    border-color: #4a9e6e;
    font-weight: 600;
    cursor: default;
  }
  .screen-bar button:disabled { opacity: 0.6; cursor: default; }

  /* ===== PAGE WRAPPER ===== */
  .page-wrap { padding: 48px 20px 60px; }

  /* ===== DOCUMENT ===== */
  .doc {
    background: white;
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 18mm 16mm 16mm;
    position: relative;
  }

  /* ===== TITLE ===== */
  .doc-title {
    font-size: 36px;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .doc-meta {
    display: flex;
    gap: 32px;
    font-size: 12px;
    color: var(--ink-2);
    margin-bottom: 28px;
  }
  .doc-meta span { display: flex; gap: 6px; }

  /* ===== ADDRESS BLOCK ===== */
  .addr-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  .addr-col { font-size: 12px; line-height: 1.8; }
  .addr-col .name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .addr-col.right { text-align: right; position: relative; line-height: 1.2; }
  .kakuin {
    position: absolute;
    top: -56px; right: 0;
    width: 96px; height: 96px;
    opacity: 0.82;
    pointer-events: none;
  }
  .addr-col .company-title {
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  /* ===== DIVIDERS ===== */
  .divider      { border: none; border-top: 1.5px solid var(--line-dark); margin-bottom: 0; }
  .divider-light{ border: none; border-top: 1px solid var(--line); margin: 0; }

  /* ===== ITEMS TABLE ===== */
  :root { --item-py: 10px; }
  .items-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .items-table thead tr { border-bottom: 1px solid var(--line); }
  .items-table thead th {
    padding: 8px 8px 8px 0;
    font-weight: 500;
    color: var(--ink-3);
    font-size: 11px;
    text-align: left;
  }
  .items-table thead th.num { text-align: right; }

  /* 案件ヘッダー行 */
  .items-table tbody tr.job-header-row td {
    padding: 14px 0 4px;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-2);
  }
  /* 案件間スペーサー（太め線） */
  .items-table tbody tr.job-spacer-row td {
    height: calc(var(--item-py) * 2.5);
    padding: 0;
    border: none;
    background: linear-gradient(
      to bottom,
      transparent calc(50% - 1px),
      var(--ink-3) calc(50% - 1px),
      var(--ink-3) calc(50% + 1px),
      transparent calc(50% + 1px)
    );
  }
  /* グループ内区切り（細線） */
  .items-table tbody tr.spacer-row td {
    height: calc(var(--item-py) * 2);
    padding: 0;
    border: none;
    background: linear-gradient(
      to bottom,
      transparent calc(50% - 0.5px),
      var(--line) calc(50% - 0.5px),
      var(--line) calc(50% + 0.5px),
      transparent calc(50% + 0.5px)
    );
  }
  /* 明細行 */
  .items-table tbody tr.item-row td {
    padding: var(--item-py) 8px var(--item-py) 0;
    vertical-align: middle;
  }
  .items-table tbody tr.item-row.first-in-job td {
    padding-top: calc(var(--item-py) * 1.8);
  }

  .item-desc { font-size: 12px; color: var(--ink); }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .col-desc { width: auto; }
  .col-qty  { width: 52px; }
  .col-unit { width: 76px; }
  .col-amt  { width: 88px; }

  /* ===== TOTALS ===== */
  .totals-section {
    border-top: 1.5px solid var(--line-dark);
    margin-top: 8px;
    padding-top: 10px;
  }
  .totals-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .totals-table td { padding: 3px 0; }
  .totals-table td.lbl { color: var(--ink-2); }
  .totals-table td.val { text-align: right; font-variant-numeric: tabular-nums; }
  .totals-table tr.grand td {
    padding-top: 12px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .totals-table tr.grand td.lbl { font-size: 12px; font-weight: 500; padding-top: 18px; color: var(--ink-2); }

  /* ===== BOTTOM SECTION ===== */
  .bottom-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11px;
    line-height: 1.8;
  }
  .bottom-block .section-title {
    font-weight: 600;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .bottom-block .content { font-size: 10px; color: var(--ink-2); line-height: 1.7; }
  .bottom-block .thank-you {
    font-size: 10px;
    color: var(--ink-2);
    line-height: 1.7;
    outline: none;
    min-height: 2em;
  }
  @media screen {
    .bottom-block .thank-you[contenteditable]:hover { background: #f8f7f4; border-radius: 3px; }
    .bottom-block .thank-you[contenteditable]:focus { background: #f8f7f4; border-radius: 3px; box-shadow: 0 0 0 1.5px var(--line); }
  }

  /* ===== FOOTER ===== */
  .doc-footer-wrap { position: absolute; bottom: 12mm; left: 16mm; right: 16mm; }
  .doc-footer-logo { text-align: right; padding-bottom: 6px; }
  .doc-footer-logo img { height: 15px; width: auto; }
  .doc-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--ink-3);
    border-top: 1px solid var(--line);
    padding-top: 6px;
  }

  /* ===== EMPTY / ERROR ===== */
  .empty-state { padding: 60px; text-align: center; color: var(--ink-3); }
  .empty-state a { color: #006985; }

  /* ===== PRINT ===== */
  @page { size: A4; margin: 15mm; }
  @media print {
    html, body { background: white; }
    .screen-bar { display: none; }
    .page-wrap { padding: 0; }
    .doc { width: 100%; min-height: 0; margin: 0; padding: 0; box-shadow: none; }
    /* フッターはページ固定 */
    .doc-footer-wrap { position: fixed; bottom: 0; left: 0; right: 0; }
    /* グラデーション線 → border に切り替え（背景画像不要） */
    .items-table tbody tr.spacer-row td {
      background: none;
      border-top: 1px solid var(--line);
      height: var(--item-py);
      padding: var(--item-py) 0 0;
    }
    .items-table tbody tr.job-spacer-row td {
      background: none;
      border-top: 1.5px solid var(--ink-3);
      height: var(--item-py);
      padding: calc(var(--item-py) * 1.25) 0 0;
    }
  }
</style>
</head>
<body>

<div class="screen-bar" id="screen-bar">
  <a id="back-link" href="index.html">← 一覧へ戻る</a>
  <div style="font-size:11px; color:#aaa;">印刷設定：用紙 A4 ／ ヘッダーとフッター オフ ／ 背景画像 オン</div>
  <div class="actions">
    <button id="btn-issue" onclick="markAsIssued()" style="display:none">発行済みにする</button>
    <button id="btn-reset-notes" onclick="resetNotes()" style="display:none">備考を初期化</button>
    <button class="primary" onclick="window.print()">印刷 / PDF保存</button>
  </div>
</div>

<div class="page-wrap">
  <div id="root"></div>
</div>

<script src="data.js"></script>
<script>
(function () {
  const D = window.IDEARNEST;
  const $ = id => document.getElementById(id);
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtYen = n => n == null ? '' : '¥' + Number(n).toLocaleString('ja-JP');
  const fmtDate = s => s ? s.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$1年$2月$3日').replace(/年0/,'年').replace(/月0/,'月') : '';

  // 請求月（"26.04"）から月末日を返す
  const billingLastDay = (billingMonth) => {
    if (!billingMonth) return '';
    const parts = billingMonth.split('.');
    if (parts.length !== 2) return '';
    const year = 2000 + parseInt(parts[0], 10);
    const month = parseInt(parts[1], 10);
    return new Date(year, month, 0).toISOString().split('T')[0];
  };

  if (!D) {
    $('root').innerHTML = '<div class="empty-state">data.js が見つかりません。</div>';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  const baseJob = (D.jobs || []).find(j => String(j.制作番号) === String(idParam) || j.TickTick_task_id === idParam);

  if (!baseJob) {
    $('root').innerHTML = `<div class="empty-state">案件 #${esc(idParam || '?')} が見つかりません。<br><a href="index.html">← 一覧へ戻る</a></div>`;
    return;
  }

  // 状態チェック
  if (baseJob.状態 !== '請求OK' && baseJob.状態 !== '請求書発行済') {
    $('root').innerHTML = `<div class="empty-state">この案件はまだ「請求OK」になっていません。<br>ワークシートで状態を「請求OK」にしてから開いてください。<br><br><a href="index.html">← 一覧へ戻る</a></div>`;
    return;
  }

  const alreadyIssued = baseJob.状態 === '請求書発行済';

  // ===== 同クライアント × 同請求月 × 対象状態 の案件を収集 =====
  // 発行済みの場合は請求書発行済の案件を、未発行の場合は請求OKの案件を表示
  const targetStatus = alreadyIssued ? '請求書発行済' : '請求OK';
  const targetJobs = (D.jobs || [])
    .filter(j => j.クライアント === baseJob.クライアント && j.請求月 === baseJob.請求月 && j.状態 === targetStatus)
    .sort((a, b) => (a.制作番号 || 0) - (b.制作番号 || 0));

  // ===== クライアント・設定 =====
  const client  = (D.clients || []).find(c => c.id === baseJob.クライアント || c.社名 === baseJob.クライアント) || {};
  const co      = D.settings?.company || {};
  const bank    = D.settings?.bank    || {};
  const docTitle  = D.settings?.document_defaults?.請求書?.title    || '御請求書';
  const greeting  = D.settings?.document_defaults?.請求書?.greeting || '平素は格別のお引き立てを賜り厚く御礼申し上げます。上記の通りご請求申し上げます。';
  const isWebJob  = targetJobs.some(j => j.媒体 === 'web');
  const webNotice = 'ホームページの停止・移管をご希望の場合は、2ヶ月前にお申し出ください。お申し出が2ヶ月未満となる場合は、次期更新時までのご契約となりますのでご了承ください。';

  // ===== 行データ収集 =====
  const rows = [];
  let allItems = [];

  for (const job of targetJobs) {
    // 案件間スペーサー（2件目以降）
    if (rows.length > 0) rows.push({ _type: 'job-spacer' });

    // 案件ヘッダー
    const jobLabel = [job.制作番号 ? `#${job.制作番号}` : '', job.製品名 || ''].filter(Boolean).join('  ');
    rows.push({ _type: 'job-header', label: jobLabel });

    let firstInJob = true;

    // 社内明細
    for (const m of (job.明細 || [])) {
      const selected = (m.選択肢 || []).filter(o => o.選択);
      if (selected.length === 0) continue;
      if (!firstInJob) rows.push({ _type: 'spacer' });
      for (const o of selected) {
        const item = { _type: 'item', firstInJob, desc: o.内容 || '', qty: o.数量, unit: o.単価, amt: o.金額, rate: m.税率 ?? 10 };
        rows.push(item);
        allItems.push(item);
        firstInJob = false;
      }
    }

    // 外注
    const gaichuItems = [];
    for (const g of (job.外注 || [])) {
      for (const o of (g.選択肢 || [])) {
        if (o.選択 && o.請求額) gaichuItems.push(o);
      }
    }
    if (gaichuItems.length > 0) {
      if (!firstInJob) rows.push({ _type: 'spacer' });
      for (const o of gaichuItems) {
        const item = { _type: 'item', firstInJob, desc: o.内容 || '', qty: o.数量, unit: o.単価, amt: o.請求額, rate: 10 };
        rows.push(item);
        allItems.push(item);
        firstInJob = false;
      }
    }
  }

  // ===== 合計計算（全案件合算） =====
  const subtotal = allItems.reduce((s, r) => s + (r.amt || 0), 0);
  const taxMap = {};
  for (const r of allItems) {
    const rate = r.rate ?? 10;
    taxMap[rate] = (taxMap[rate] || 0) + Math.round((r.amt || 0) * rate / 100);
  }
  const totalTax = Object.values(taxMap).reduce((s, v) => s + v, 0);
  const grandTotal = subtotal + totalTax;

  // ===== 担当者 =====
  const tanto = (client.担当者 || []).find(t => t.名前) || {};
  const tantoPart = client.請求書送り先名前
    ? `<div>${esc(client.請求書送り先名前)} 様</div>`
    : tanto.名前 ? `<div>${esc(tanto.名前)} 様</div>` : '';

  // ===== 請求日・No. =====
  const invoiceDate = billingLastDay(baseJob.請求月);
  const docNo = targetJobs.length === 1
    ? String(targetJobs[0].制作番号 || '')
    : targetJobs.map(j => j.制作番号).filter(Boolean).join('・');

  // ===== アイテム行 HTML =====
  const itemsHtml = rows.map(r => {
    if (r._type === 'job-spacer') {
      return `<tr class="job-spacer-row"><td colspan="4"></td></tr>`;
    }
    if (r._type === 'job-header') {
      return `<tr class="job-header-row"><td colspan="4">${esc(r.label)}</td></tr>`;
    }
    if (r._type === 'spacer') {
      return `<tr class="spacer-row"><td colspan="4"></td></tr>`;
    }
    const qtyDisp  = r.qty  != null ? String(r.qty).replace(/[^\d.枚部冊式点]/g,'') || r.qty : '';
    const unitDisp = r.unit != null ? fmtYen(r.unit) : '';
    const amtDisp  = r.amt  != null ? fmtYen(r.amt)  : '';
    return `<tr class="item-row${r.firstInJob ? ' first-in-job' : ''}">
      <td class="col-desc"><div class="item-desc">${esc(r.desc)}</div></td>
      <td class="col-qty num">${esc(qtyDisp)}</td>
      <td class="col-unit num">${unitDisp}</td>
      <td class="col-amt num">${amtDisp}</td>
    </tr>`;
  }).join('');

  // ===== 税額行 HTML =====
  const taxRows = Object.entries(taxMap).map(([rate, tax]) =>
    `<tr><td class="lbl">消費税（${rate}%）</td><td></td><td class="val">${fmtYen(tax)}</td></tr>`
  ).join('');

  // ===== 振込先 =====
  const bankHtml = bank.name ? `
    <div>${esc(bank.name)} ${esc(bank.branch)}</div>
    <div>${esc(bank.account_type)} ${esc(bank.account_number)}</div>
    <div>${esc(bank.account_holder)}</div>
    ${bank.fee_note ? `<div style="margin-top:4px;color:var(--ink-3)">${esc(bank.fee_note)}</div>` : ''}
  ` : '';

  const invoiceNo = co.invoice_registration_number ? `登録番号: ${co.invoice_registration_number}` : '';

  // ===== レンダリング =====
  const html = `
  <div class="doc">

    <div class="doc-title">${esc(docTitle)}</div>
    <div class="doc-meta">
      <span><span style="color:var(--ink-3)">No.</span> ${esc(docNo)}</span>
      <span><span style="color:var(--ink-3)">請求日</span> ${fmtDate(invoiceDate)}</span>
    </div>

    <div class="addr-block">
      <div class="addr-col left">
        <div class="name">${esc(client.社名_請求書用 || client.社名 || baseJob.クライアント || '')} ${esc(client.敬称 || baseJob.敬称 || '御中')}</div>
        ${client.郵便番号     ? `<div>〒${esc(client.郵便番号)}</div>`       : ''}
        ${client.住所_請求書用 ? `<div>${esc(client.住所_請求書用)}</div>`   : ''}
        ${tantoPart}
      </div>
      <div class="addr-col right">
        <img class="kakuin" src="assets/stamp.svg" alt="角印">
        <div class="company-title">WORKSHEET</div>
        <div class="name">${esc(co.name || '会社名')}</div>
        ${co.postal_code ? `<div>〒${esc(co.postal_code)}</div>` : ''}
        ${co.address     ? `<div>${esc(co.address)}</div>`       : ''}
        ${co.tel         ? `<div>Tel: ${esc(co.tel)}</div>`      : ''}
        ${co.email       ? `<div>${esc(co.email)}</div>`         : ''}
        ${co.url         ? `<div>${esc(co.url)}</div>`           : ''}
      </div>
    </div>

    <hr class="divider">

    <table class="items-table">
      <thead>
        <tr>
          <th class="col-desc">品目</th>
          <th class="col-qty num">数量</th>
          <th class="col-unit num">単価</th>
          <th class="col-amt num">金額</th>
        </tr>
      </thead>
      <tbody>
        ${itemsHtml || '<tr class="item-row"><td colspan="4" style="color:var(--ink-3);padding:20px 0;">明細未入力</td></tr>'}
      </tbody>
    </table>

    <div class="totals-section">
      <table class="totals-table">
        <colgroup><col><col style="width:120px"><col style="width:110px"></colgroup>
        <tr><td class="lbl">小計</td><td></td><td class="val">${fmtYen(subtotal)}</td></tr>
        ${taxRows}
        <tr><td colspan="3" style="padding:0"><hr class="divider-light" style="margin:6px 0"></td></tr>
        <tr class="grand">
          <td class="lbl">合計金額</td><td></td><td class="val">${fmtYen(grandTotal)}</td>
        </tr>
      </table>
    </div>

    <div class="bottom-block">
      <div>
        <div class="section-title">お振込先</div>
        <div class="content">${bankHtml}</div>
      </div>
      <div>
        <div class="section-title">備考</div>
        <div class="thank-you" contenteditable="true">${esc(greeting)}${isWebJob ? '<br><br>' + esc(webNotice) : ''}</div>
      </div>
    </div>

    <div class="doc-footer-wrap">
      <div class="doc-footer-logo">
        <img src="assets/logo.svg" alt="IDEARNEST">
      </div>
      <div class="doc-footer">
        <span>${invoiceNo}</span>
        <span>${esc(co.name || '')}</span>
      </div>
    </div>

  </div>`;

  $('root').innerHTML = html;
  document.title = `御請求書 #${docNo} — ${baseJob.クライアント || ''}`;
  $('back-link').href = 'index.html';

  // ===== 発行済みボタン制御 =====
  const issueBtn = document.getElementById('btn-issue');
  if (alreadyIssued) {
    issueBtn.textContent = '発行済み';
    issueBtn.className = 'issued';
    issueBtn.disabled = true;
    issueBtn.style.display = '';
  } else {
    issueBtn.style.display = '';
  }

  // ===== 備考の自動保存（クライアント×請求月でキー） =====
  const storageKey = `invoice_notes_${baseJob.クライアント}_${baseJob.請求月 || ''}`;
  const editables = document.querySelectorAll('.thank-you[contenteditable]');

  // デフォルト内容はlocalStorage適用前に保存
  window._invoiceStorageKey   = storageKey;
  window._invoiceDefaultNotes = Array.from(editables).map(el => el.innerHTML);
  document.getElementById('btn-reset-notes').style.display = '';

  const saved = localStorage.getItem(storageKey);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      editables.forEach((el, i) => { if (data[i] !== undefined) el.innerHTML = data[i]; });
    } catch(e) {}
  }

  const saveNotes = () => {
    localStorage.setItem(storageKey, JSON.stringify(Array.from(editables).map(el => el.innerHTML)));
  };
  editables.forEach(el => el.addEventListener('input', saveNotes));

})();

// ===== 備考を初期化 =====
function resetNotes() {
  if (!confirm('備考欄の内容をデフォルトに戻しますか？')) return;
  localStorage.removeItem(window._invoiceStorageKey);
  const editables = document.querySelectorAll('.thank-you[contenteditable]');
  editables.forEach((el, i) => { el.innerHTML = window._invoiceDefaultNotes[i] || ''; });
}

// ===== 発行済みにする =====
async function markAsIssued() {
  const btn = document.getElementById('btn-issue');
  if (!btn || btn.disabled) return;

  // targetJobs は閉じた変数にアクセスできないため、data.js から直接取得
  const D = window.IDEARNEST;
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  const baseJob = (D.jobs || []).find(j => String(j.制作番号) === String(idParam) || j.TickTick_task_id === idParam);
  if (!baseJob) return;

  const jobs = (D.jobs || [])
    .filter(j => j.クライアント === baseJob.クライアント && j.請求月 === baseJob.請求月 && j.状態 === '請求OK');

  const label = jobs.length > 1
    ? `${jobs.map(j => `#${j.制作番号}`).join('・')} の ${jobs.length} 件`
    : `#${jobs[0]?.制作番号}`;
  if (!confirm(`${label} を「請求書発行済」にしますか？\nこの操作後、請求書ページには表示されなくなります。`)) return;

  btn.disabled = true;
  btn.textContent = '処理中...';

  let allOk = true;
  for (const job of jobs) {
    try {
      const r = await fetch('/api/update-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 制作番号: job.制作番号, TickTick_task_id: job.TickTick_task_id, 状態: '請求書発行済' }),
      });
      if (!r.ok) allOk = false;
    } catch (e) { allOk = false; }
  }

  if (allOk) {
    btn.textContent = '発行済み';
    btn.className = 'issued';
  } else {
    btn.disabled = false;
    btn.textContent = '発行済みにする';
    alert('更新に失敗しました。サーバが起動しているか確認してください（python3 scripts/serve.py）。');
  }
}
</script>
