    $('#minute-modal-foot').innerHTML = `
      <button class="modal-btn" id="m-cancel">キャンセル</button>
      <button class="modal-btn primary" id="m-submit">保存</button>
    `;

    let currentSource = 'audio';
    let selectedAudioFile = null;

    function applySourceMode(src) {
      currentSource = src;
      $('#source-picker').querySelectorAll('.source-btn').forEach(b => b.classList.toggle('active', b.dataset.src === src));
      $('#manual-fields').style.display = src === 'manual' ? 'block' : 'none';
      $('#ai-fields').style.display = (src === 'email' || src === 'line' || src === 'phone') ? 'block' : 'none';
      $('#audio-fields').style.display = src === 'audio' ? 'block' : 'none';
      $('#email-from-row').style.display = src === 'email' ? 'flex' : 'none';
      $('#email-subject-row').style.display = src === 'email' ? 'flex' : 'none';
      const labels = { email: 'メール本文', line: 'チャットログ', phone: '電話メモ' };
      $('#ai-input-label').textContent = labels[src] || '本文';
    }
    applySourceMode('audio');

    $('#source-picker').querySelectorAll('.source-btn').forEach(btn => {
      btn.addEventListener('click', () => applySourceMode(btn.dataset.src));
    });

    // 音声ドロップゾーン
    const dz = $('#audio-dropzone');
    const fileInput = $('#m-audio-file');
    function showSelectedAudio(f) {
      selectedAudioFile = f;
      const info = $('#audio-selected-info');
      info.style.display = 'block';
      const sizeMB = (f.size / 1024 / 1024).toFixed(1);
      info.innerHTML = `<strong>${escapeHtml(f.name)}</strong> （${sizeMB} MB）`;
    }
    $('#m-audio-pick').addEventListener('click', (e) => { e.preventDefault(); fileInput.click(); });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) showSelectedAudio(e.target.files[0]);
    });
    ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dz.style.borderColor = 'var(--color-primary)';
      dz.style.background = 'var(--color-secondary)';
    }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dz.style.borderColor = 'var(--line-2)';
      dz.style.background = 'var(--bg)';
    }));
    dz.addEventListener('drop', (e) => {
      const f = e.dataTransfer.files[0];
      if (f) showSelectedAudio(f);
    });

    $('#m-cancel').addEventListener('click', closeMinuteModal);
    $('#m-submit').addEventListener('click', () => submitMinuteAdd(currentSource, selectedAudioFile));

    modal.classList.add('show');
  }

  async function submitMinuteAdd(sourceType, audioFile) {
    const date = $('#m-date').value;
    const time = $('#m-time').value;
    const client = $('#m-client').value || null;
    const job = $('#m-job').value || null;

    const submitBtn = $('#m-submit');
    submitBtn.disabled = true;
    const origText = submitBtn.textContent;

    try {
      if (sourceType === 'audio') {
        if (!audioFile) { alert('録音ファイルを選択またはドロップしてください'); submitBtn.disabled = false; return; }
        if (!client) { alert('クライアントを選択してください'); submitBtn.disabled = false; return; }
        submitBtn.textContent = 'アップロード中...';
        const fd = new FormData();
        fd.append('audio', audioFile, audioFile.name);
        fd.append('client_hint', client);
        if (job) fd.append('job_hint', job);
        fd.append('date', date);
        fd.append('time', time);
        const r = await fetch('/api/minutes/upload-audio', { method: 'POST', body: fd });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'upload failed');
        showToast('アップロード完了。バックグラウンドで文字起こし→議事録化中...');
        const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
        eval(newScript);
        closeMinuteModal();
        renderMinutes();
        startMinuteStatusPolling(j.minute_id);
        return;
      }
      if (sourceType === 'manual') {
        const title = $('#m-title').value.trim();
        const note = $('#m-note').value;
        if (!title) { alert('タイトルを入力してください'); submitBtn.disabled = false; return; }
        if (!client) { alert('クライアントを選択してください'); submitBtn.disabled = false; return; }
        submitBtn.textContent = '保存中...';
        const record = {
          id: `${date.replace(/-/g,'')}_${time.replace(':','')}_${job || 'NEW'}`,
          date, time, title,
          client_id: client,
          job_no: job ? String(job) : null,
          source_type: 'manual',
          source_meta: {},
          raw_input: note,
          summary: note.slice(0, 200),
          decisions: [], new_requests: [], modifications: [], schedules: [], next_actions: [],
          tags: [],
          applied: { ticktick_task_ids: [], worksheet_updates: [], applied_at: null, applied_by: null },
        };
        const r = await fetch('/api/minutes/save', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(record),
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'save failed');
        showToast('議事録を保存しました');
      } else {
        const text = $('#m-raw').value.trim();
        if (!text) { alert('本文を入力してください'); submitBtn.disabled = false; return; }
        submitBtn.textContent = 'AI議事録化中...（10〜20秒）';
        const body = {
          text, date, time,
          source_type: sourceType,
          client_hint: client,
          job_hint: job,
          source_meta: sourceType === 'email' ? {
            from: $('#m-email-from').value,
            subject: $('#m-email-subject').value,
          } : {},
        };
        const r = await fetch('/api/minutes/create', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify(body),
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error || 'create failed');
        showToast('議事録を作成しました');
      }
      // データ再読込
      const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
      eval(newScript);
      closeMinuteModal();
      renderMinutes();
    } catch (e) {
      alert('エラー: ' + e.message);
      submitBtn.disabled = false;
      submitBtn.textContent = origText;
    }
  }

  async function openMinuteDetail(mid) {
    const modal = $('#minute-modal');
    $('#minute-modal-title').textContent = '読み込み中...';
    $('#minute-modal-body').innerHTML = '<div style="padding:40px; text-align:center; color:var(--ink-3);">読み込み中...</div>';
    $('#minute-modal-foot').innerHTML = '';
    modal.classList.add('show');

    let rec;
    try {
      const r = await fetch(`/api/minutes/get?id=${encodeURIComponent(mid)}`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error);
      rec = j.minute;
    } catch (e) {
      // サーバオフライン時は data.js から（transcript無し）
      rec = (D.minutes || []).find(m => m.id === mid);
      if (!rec) {
        $('#minute-modal-body').innerHTML = `<div style="padding:40px; color:var(--danger);">読み込み失敗: ${escapeHtml(e.message)}</div>`;
        return;
      }
    }

    const { label: sourceLabel } = sourceInfo(rec.source_type, rec.source_meta);
    const isApplied = !!(rec.applied && rec.applied.applied_at);

    $('#minute-modal-title').innerHTML = `${escapeHtml(rec.title || '(無題)')}`;

    const renderSection = (label, items, formatter) => {
      const empty = !items || items.length === 0;
      return `<div class="digest-section${empty?' empty':''}">
        <h4>${label} <span class="count">${items?.length || 0}件</span></h4>
        <ul>${empty ? '<li>—</li>' : items.map(formatter).join('')}</ul>
      </div>`;
    };

    const meta = `
      <div style="font-size:12px; color:var(--ink-3); margin-bottom:14px; display:flex; gap:14px; flex-wrap:wrap; align-items:center;">
        <span>${escapeHtml(rec.date)} ${escapeHtml(rec.time || '')}</span>
        <span>クライアント: ${escapeHtml(rec.client_id || '?')}</span>
        <span>案件: ${rec.job_no ? '#'+escapeHtml(rec.job_no) : '新規/未確定'}</span>
        <span>ソース: ${sourceBadge(rec.source_type, rec.source_meta)}</span>
      </div>
    `;

    const appliedBanner = isApplied
      ? `<div class="applied-banner">${escapeHtml(rec.applied.applied_at)} に反映済み${rec.applied.note ? '（' + escapeHtml(rec.applied.note) + '）' : ''}</div>`
      : '';

    const summary = rec.summary
      ? `<div style="font-size:13px; line-height:1.7; padding:12px 14px; background:var(--color-cream); border-radius:4px; margin-bottom:16px;">${escapeHtml(rec.summary)}</div>`
      : '';

    const tagsHtml = (rec.tags && rec.tags.length)
      ? `<div style="margin-bottom:14px;">${rec.tags.map(t => `<span style="display:inline-block; background:var(--color-secondary); color:var(--ink-2); font-size:11px; padding:2px 10px; border-radius:10px; margin-right:6px;">${escapeHtml(t)}</span>`).join('')}</div>`
      : '';

    const sections = [
      renderSection('決定事項', rec.decisions, d => `<li>${escapeHtml(d.text || '')}</li>`),
      renderSection('新規依頼', rec.new_requests, r => `<li>${escapeHtml(r.text || '')}${r.estimated_scope ? `<span class="meta">範囲: ${escapeHtml(r.estimated_scope)}</span>`:''}</li>`),
      renderSection('修正・追加', rec.modifications, m => `<li>${escapeHtml(m.text || '')}<span class="meta">${m.target_job_no ? '案件 #'+escapeHtml(m.target_job_no) : ''}${m.deadline ? ' / 期日: '+escapeHtml(m.deadline) : ''}</span></li>`),
      renderSection('スケジュール', rec.schedules, s => `<li>${escapeHtml(s.text || '')}<span class="meta">${escapeHtml(s.datetime || '')} (${escapeHtml(s.type || '')})</span></li>`),
      renderSection('次のアクション', rec.next_actions, a => `<li>${escapeHtml(a.text || '')}<span class="meta">担当: ${escapeHtml(a.owner || '-')}${a.deadline ? ' / 期日: '+escapeHtml(a.deadline) : ''}</span></li>`),
    ].join('');

    const transcriptHtml = rec.transcript
      ? `<details style="margin-top:18px;"><summary style="cursor:pointer; font-size:12px; color:var(--ink-3); padding:6px 0;">▼ 元テキスト / 文字起こし全文を表示</summary>
         <pre style="white-space:pre-wrap; font-size:12px; line-height:1.6; padding:12px; background:var(--bg); border-radius:4px; margin-top:8px; max-height:300px; overflow-y:auto;">${escapeHtml(rec.transcript)}</pre></details>`
      : (rec.raw_input ? `<details style="margin-top:18px;"><summary style="cursor:pointer; font-size:12px; color:var(--ink-3); padding:6px 0;">▼ 元入力テキストを表示</summary>
         <pre style="white-space:pre-wrap; font-size:12px; line-height:1.6; padding:12px; background:var(--bg); border-radius:4px; margin-top:8px; max-height:300px; overflow-y:auto;">${escapeHtml(rec.raw_input)}</pre></details>` : '');

    $('#minute-modal-body').innerHTML = meta + appliedBanner + summary + tagsHtml + sections + transcriptHtml;

    $('#minute-modal-foot').innerHTML = `
      <button class="modal-btn danger" id="m-delete">削除</button>
      <button class="modal-btn" id="m-close-detail">閉じる</button>
      ${isApplied ? '' : `<button class="modal-btn primary" id="m-apply">TickTick / WORKSHEET に反映</button>`}
    `;

    $('#m-close-detail').addEventListener('click', closeMinuteModal);
    $('#m-delete').addEventListener('click', async () => {
      if (!confirm(`議事録「${rec.title}」を削除しますか？`)) return;
      const r = await fetch('/api/minutes/delete', {
        method: 'POST', headers: {'content-type': 'application/json'},
        body: JSON.stringify({id: rec.id}),
      });
      const j = await r.json();
      if (!j.ok) { alert('削除失敗: ' + j.error); return; }
      const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
      eval(newScript);
      closeMinuteModal();
      renderMinutes();
    });
    const applyBtn = $('#m-apply');
    if (applyBtn) {
      applyBtn.addEventListener('click', () => openApplyPreview(rec.id));
    }
  }

  // ====== STATUS POLLING (音声処理) ======
  const _polling = new Map(); // mid -> intervalId

  function startMinuteStatusPolling(mid) {
    if (_polling.has(mid)) return;
    const t = setInterval(async () => {
      try {
        const r = await fetch(`/api/minutes/get?id=${encodeURIComponent(mid)}`);
        const j = await r.json();
        if (!j.ok) return;
        const m = j.minute;
        // data.js の minutes 配列を更新（簡易）
        const arr = D.minutes || (D.minutes = []);
        const idx = arr.findIndex(x => x.id === mid);
        const slim = Object.assign({}, m);
        delete slim.transcript; delete slim.raw_input;
        if (idx >= 0) arr[idx] = slim; else arr.unshift(slim);
        renderMinutes();
        renderJobs();
        if (m.status === 'ready') {
          clearInterval(t);
          _polling.delete(mid);
          showToast(`議事録化完了：${m.title || '(無題)'}`);
        } else if (m.status === 'error') {
          clearInterval(t);
          _polling.delete(mid);
          showToast('議事録化失敗（詳細は議事録モーダルで）', 'danger');
        }
      } catch (e) { /* ignore network errors during polling */ }
    }, 5000);
    _polling.set(mid, t);
  }

  // 起動時：処理中の議事録があればポーリング再開
  function resumePollingForInProgress() {
    (D.minutes || []).forEach(m => {
      if (m.status === 'processing_transcribe' || m.status === 'processing_digest') {
        startMinuteStatusPolling(m.id);
      }
    });
  }

  // ====== APPLY PREVIEW MODAL ======
  async function openApplyPreview(mid) {
    $('#minute-modal-title').innerHTML = '反映プレビュー';
    $('#minute-modal-body').innerHTML = '<div style="padding:40px; text-align:center; color:var(--ink-3);">プラン作成中...</div>';
    $('#minute-modal-foot').innerHTML = '';

    let preview;
    try {
      const r = await fetch('/api/minutes/preview-apply', {
        method: 'POST', headers: {'content-type': 'application/json'},
        body: JSON.stringify({id: mid}),
      });
      preview = await r.json();
      if (!preview.ok) throw new Error(preview.error);
    } catch (e) {
      $('#minute-modal-body').innerHTML = `<div style="padding:40px; color:var(--danger);">プレビュー失敗: ${escapeHtml(e.message)}</div>`;
      $('#minute-modal-foot').innerHTML = `<button class="modal-btn" id="m-back">戻る</button>`;
      $('#m-back').addEventListener('click', () => openMinuteDetail(mid));
      return;
    }

    const plans = preview.plans || [];
    const KIND_LABEL = {
      'modification_to_existing': '修正：既存案件のチェック項目に追加',
      'create_new_job': '新規：WORKSHEETに案件として登録',
      'schedule_to_existing': '予定：既存案件のチェック項目に追加',
      'schedule_as_task': '予定：TickTickリマインダー作成',
      'next_action_to_existing': 'アクション：既存案件のチェック項目に追加',
      'next_action_as_task': 'アクション：TickTickタスクとして追加',
      'skip_client_action': '記録のみ（クライアント側）',
    };

    if (plans.length === 0) {
      $('#minute-modal-body').innerHTML = `
        <div style="padding:30px; text-align:center; color:var(--ink-3);">
          反映するプランがありません<br>
          <span style="font-size:11px;">この議事録には新規依頼・修正・スケジュール・次のアクションが含まれていません</span>
        </div>`;
      $('#minute-modal-foot').innerHTML = `<button class="modal-btn" id="m-back">戻る</button>`;
      $('#m-back').addEventListener('click', () => openMinuteDetail(mid));
      return;
    }

    $('#minute-modal-body').innerHTML = `
      <div style="font-size:12px; color:var(--ink-2); margin-bottom:12px; padding:8px 12px; background:var(--color-cream); border-radius:4px;">
        以下の項目から、反映する操作を選んで「実行」を押してください。<br>
        実行されると TickTick / WORKSHEET が変更されます。
      </div>
      <div id="apply-plans" style="display:flex; flex-direction:column; gap:8px;">
        ${plans.map((p, i) => {
          const exec = p.executable !== false;
          return `<label class="apply-plan-row" style="display:flex; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:4px; cursor:${exec?'pointer':'not-allowed'}; ${exec?'':'opacity:0.5;'} background:var(--card-bg);">
            <input type="checkbox" data-plan-idx="${i}" ${exec ? 'checked' : 'disabled'} style="margin-top:3px;">
            <div style="flex:1; min-width:0;">
              <div style="font-size:12px; color:var(--ink-3); margin-bottom:2px;">${KIND_LABEL[p.kind] || p.kind}</div>
              <div style="font-size:13px; font-weight:600; color:var(--ink); margin-bottom:2px;">${escapeHtml(p.label || '')}</div>
              <div style="font-size:12px; color:var(--ink-2);">${escapeHtml(p.detail || '')}</div>
              ${p.reason_if_not ? `<div style="font-size:11px; color:var(--danger); margin-top:4px;">${escapeHtml(p.reason_if_not)}</div>` : ''}
            </div>
          </label>`;
        }).join('')}
      </div>
    `;

    $('#minute-modal-foot').innerHTML = `
      <button class="modal-btn" id="m-back-detail">戻る</button>
      <button class="modal-btn" id="m-toggle-all">全選択/解除</button>
      <button class="modal-btn primary" id="m-execute">選択項目を実行</button>
    `;

    $('#m-back-detail').addEventListener('click', () => openMinuteDetail(mid));

    $('#m-toggle-all').addEventListener('click', () => {
      const cbs = document.querySelectorAll('#apply-plans input[type="checkbox"]:not(:disabled)');
      const allChecked = [...cbs].every(c => c.checked);
      cbs.forEach(c => c.checked = !allChecked);
    });

    $('#m-execute').addEventListener('click', async () => {
      const cbs = document.querySelectorAll('#apply-plans input[type="checkbox"]:checked');
      const indices = [...cbs].map(c => parseInt(c.dataset.planIdx, 10));
      if (indices.length === 0) {
        alert('実行する項目を選択してください');
        return;
      }
      if (!confirm(`${indices.length}件を実行します。よろしいですか？\nこの操作は TickTick / WORKSHEET に変更を加えます。`)) return;

      const btn = $('#m-execute');
      btn.disabled = true;
      btn.textContent = '実行中...';

      try {
        const r = await fetch('/api/minutes/apply', {
          method: 'POST', headers: {'content-type': 'application/json'},
          body: JSON.stringify({id: mid, selected_indices: indices}),
        });
        const j = await r.json();
        if (!j.ok) throw new Error(j.error);

        // 結果表示
        const results = j.results || [];
        const successList = results.filter(r => r.ok).map(r => `<li style="color:var(--color-green);">[OK] ${escapeHtml(r.result || '')}</li>`).join('');
        const failList = results.filter(r => !r.ok).map(r => `<li style="color:var(--danger);">[NG] ${escapeHtml(r.error || '')}</li>`).join('');

        $('#minute-modal-body').innerHTML = `
          <div style="margin-bottom:14px; padding:12px; background:${j.failed_count?'#fdf0e6':'#e8f5e8'}; border-radius:4px; font-size:13px;">
            <strong>反映完了</strong> — 成功 ${j.succeeded_count}件 / 失敗 ${j.failed_count}件
          </div>
          ${successList ? `<h4 style="font-size:12px; color:var(--ink-3); margin-bottom:6px;">成功</h4><ul style="font-size:13px; line-height:1.7; padding-left:20px; margin-bottom:14px;">${successList}</ul>` : ''}
          ${failList ? `<h4 style="font-size:12px; color:var(--ink-3); margin-bottom:6px;">失敗</h4><ul style="font-size:13px; line-height:1.7; padding-left:20px;">${failList}</ul>` : ''}
        `;
        $('#minute-modal-foot').innerHTML = `
          <button class="modal-btn" id="m-close-result">閉じる</button>
          <button class="modal-btn primary" id="m-detail-after">議事録詳細へ</button>
        `;
        $('#m-close-result').addEventListener('click', () => {
          closeMinuteModal();
          // データ再読込
          fetch('data.js?_=' + Date.now()).then(r => r.text()).then(t => { eval(t); renderMinutes(); renderJobs(); });
        });
        $('#m-detail-after').addEventListener('click', async () => {
          const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
          eval(newScript);
          renderJobs();
          openMinuteDetail(mid);
        });
        showToast(`反映完了 (${j.succeeded_count}/${indices.length})`);
      } catch (e) {
        alert('反映失敗: ' + e.message);
        btn.disabled = false;
        btn.textContent = '選択項目を実行';
      }
    });
  }

  // ====== INIT ======
  renderHeader();
  renderStats();
  renderPills();
  renderJobs();
  checkServer();
  resumePollingForInProgress();

  // TickTick同期ボタン
  document.getElementById('btn-sync-tt').addEventListener('click', () => syncTickTick(true));
})();
</script>
</body>
</html>
