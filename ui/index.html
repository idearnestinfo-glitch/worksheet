<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>WORKSHEET — WORKSHEET</title>
<style>
  :root {
    /* Brand palette - 主要 */
    --color-primary: #839FD6;       /* blue (基本) */
    --color-secondary: #CAD8E8;     /* light blue */
    --color-cream: #F4EFD8;         /* cream */
    --color-pink: #D86988;          /* pink/coral */
    --color-green: #217261;         /* deep green */

    /* Brand palette - 副次（スポット利用） */
    --color-navy: #47486A;          /* muted navy */
    --color-teal: #62A1A7;          /* charming teal */
    --color-yellow: #FCC060;        /* koromiko yellow */
    --color-coral: #EE9169;         /* sushi orange */
    --color-lavender: #7678AC;      /* lavender purple */
    --color-soft-blue: #6B8CBF;     /* soft navy */
    --color-pale-pink: #EED9EA;     /* pale pink */
    --color-pale-blue: #C1D7EE;     /* pale blue */
    --color-warm-cream: #ECE3D3;    /* ballet white */
    --color-graphite: #444442;      /* matte graphite */

    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #707070;
    --ink-4: #a8a8a8;
    --line: #d2cfc8;
    --line-2: #b0aca3;
    --section-bg: var(--color-navy);
    --section-fg: #ffffff;
    --label-bg: #ececec;
    --field-bg: #ffffff;
    --highlight-yellow: var(--color-cream);
    --highlight-cyan: var(--color-secondary);
    --highlight-purple: var(--color-secondary);
    --highlight-purple-strong: var(--color-primary);
    --status-active: var(--color-cream);
    --st-quote: #6b7280;
    --st-order: var(--color-pink);
    --st-invoice: #c47f00;
    --st-done: var(--color-green);
    --st-cancel: #b0b0b0;
    --st-shooting: var(--color-lavender);
    --link: var(--color-primary);
    --danger: var(--color-pink);
    --a4-width: 794px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic Medium", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  body { min-height: 100vh; padding: 28px 24px 80px; }
  main { width: var(--a4-width); max-width: 100%; margin: 0 auto; }

  /* HERO */
  header.hero {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 8px;
    border-bottom: none;
    margin-bottom: 8px;
    gap: 16px;
  }
  .title-block h1 {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 6px;
  }
  .title-block .sub { color: var(--ink-3); font-size: 13px; letter-spacing: 0.02em; }
  .meta-block { text-align: right; color: var(--ink-2); font-size: 12px; line-height: 1.8; }
  .meta-block strong { display: block; color: var(--ink); font-size: 12px; font-weight: 600; }
  .meta-block span { display: block; }
  .meta-block .server-status { display: inline-block; margin-top: 0; }
  .server-status {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 11px;
    margin-top: 4px;
  }
  .server-status.online { background: #e8f5e8; color: #1d6f3a; }
  .server-status.offline { background: #f0eee8; color: #707070; }
  .server-status::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .server-status.online::before { background: #2f7d4a; }
  .server-status.offline::before { background: #a0a0a0; }

  /* STATS */

  /* CONTROLS */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .controls .pills { margin-top: 20px; }
  .controls-top {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .search-box { flex: 1; }
  .search-box input {
    width: 100%;
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 14px;
    font-family: inherit;
  }
  .search-box input:focus { outline: 2px solid var(--ink); outline-offset: -2px; }

  /* 絞り込みボタン */
  .btn-adv {
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink-2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-adv:hover { border-color: var(--ink); color: var(--ink); }
  .btn-adv.active { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-adv.has-filter { border-color: var(--color-primary); color: var(--color-primary); }
  .btn-adv.active.has-filter { background: var(--color-primary); border-color: var(--color-primary); color: white; }

  /* 絞り込みパネル */
  .adv-panel {
    padding: 14px 16px;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .adv-row {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .adv-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .adv-label {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .adv-select, .adv-input {
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--field-bg);
    font-size: 13px;
    font-family: inherit;
    color: var(--ink);
  }
  .adv-select { min-width: 140px; }
  .adv-input { width: 82px; }
  .adv-select:focus, .adv-input:focus { outline: 2px solid var(--ink); outline-offset: -2px; }
  .adv-month-range { display: flex; gap: 6px; align-items: center; }
  .adv-month-sep { color: var(--ink-3); font-size: 12px; }
  .adv-clear {
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: transparent;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    color: var(--ink-3);
  }
  .adv-clear:hover { border-color: var(--danger); color: var(--danger); }

  .pills { display: flex; gap: 10px; }
  .pill {
    flex: 1;
    padding: 7px 4px;
    border: 1px solid var(--line);
    background: var(--card-bg);
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    color: var(--ink-2);
    text-align: center;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--ink); color: var(--ink); }
  .pill.active { background: var(--ink); color: white; border-color: var(--ink); }
  .pill .count { color: var(--ink-3); margin-left: 4px; font-size: 11px; }
  .pill.active .count { color: rgba(255,255,255,0.7); }
  .btn-new-job {
    padding: 8px 18px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-new-job:hover { background: #222; }
  .btn-new-job:disabled { opacity: 0.35; cursor: default; }

  /* JOB CARDS (collapsed) */
  .jobs { display: flex; flex-direction: column; gap: 8px; }
  .job-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .job-card:hover { border-color: var(--ink-2); }
  .job-card.expanded { border-color: var(--ink); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .job-card-summary {
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: stretch;
    gap: 20px;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-amount {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
    white-space: nowrap;
    gap: 6px;
  }
  /* TickTick 進捗リング */
  .progress-ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .progress-ring-label {
    font-size: 9px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0;
  }
  .card-amount-num {
    display: flex;
    align-items: flex-end;
  }
  .card-amount-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    line-height: 1;
  }
  .card-amount-label {
    font-size: 11px;
    color: var(--ink-3);
    margin-left: 5px;
    font-weight: 400;
    align-self: flex-end;
    padding-bottom: 3px;
  }
  .job-row1 { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 4px; }
  .job-id { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  .job-id strong { color: var(--ink); font-weight: 700; }
  .badges { display: flex; gap: 4px; align-items: center; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    color: white;
    white-space: nowrap;
  }
  .badge.見積 { background: var(--st-quote); }
  .badge.受注 { background: var(--st-order); }
  .badge.請求OK { background: var(--st-invoice); }
  .badge.請求書発行済 { background: var(--color-teal); }
  .badge.入金確認済 { background: var(--st-done); }
  .badge.中止 { background: var(--st-cancel); }
  .badge.撮影 { background: var(--st-shooting); }
  .badge.外注 { background: transparent; color: var(--ink-2); border: 1px solid var(--ink-2); }
  .job-row2 { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .job-row3 { font-size: 13px; color: var(--color-primary); font-weight: 600; margin-bottom: 4px; }
  .job-current {
    display: inline-block;
    font-size: 12px;
    color: var(--ink);
    background: var(--color-yellow);
    padding: 2px 10px;
    border-radius: 999px;
    margin-bottom: 6px;
    font-weight: 500;
    max-width: calc(100% - 16px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: bottom;
  }
  .job-current::before { content: "現在  "; color: var(--ink-2); font-weight: 400; }
  .job-current.is-tt::before { content: "工程  "; color: var(--color-primary); font-weight: 600; }
  .job-current.is-done { background: var(--line); color: var(--ink-3); }
  .job-current.is-done::before { content: "完了  "; color: var(--ink-3); font-weight: 400; }
  .job-row4 { font-size: 11px; color: var(--ink-3); display: flex; flex-wrap: wrap; gap: 14px; }

  /* TIMELINE (進行履歴＋議事録) */
  .job-timeline { padding: 14px 18px; background: var(--card-bg); border-top: 1px solid var(--line); }
  .tl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tl-title { font-size: 12px; color: var(--ink-2); letter-spacing: 0.06em; }
  .tl-item {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 12px; padding: 5px 6px; border-radius: 3px;
    text-decoration: none; color: var(--ink);
    border-left: 2px solid var(--line); margin-bottom: 2px;
  }
  .tl-item.tl-minute { background: var(--bg); border-left-color: var(--color-primary); }
  .tl-item.tl-minute:hover { background: var(--line); }
  .tl-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-3); flex-shrink: 0; margin-top: 3px;
  }
  .tl-dot.minute { background: var(--color-primary); }
  .tl-date { color: var(--ink-3); font-size: 11px; white-space: nowrap; min-width: 72px; }
  .tl-text { flex: 1; font-weight: 500; }
  .tl-summary { color: var(--ink-3); font-size: 11px; margin-left: auto; }
  .tl-expand-btn {
    margin-top: 6px; font-size: 11px; color: var(--ink-2);
    background: none; border: none; cursor: pointer; padding: 2px 6px;
  }
  .tl-expand-btn:hover { text-decoration: underline; }
  .tl-empty { font-size: 12px; color: var(--ink-4); }
  .job-row4 span strong { color: var(--ink-2); font-weight: 500; }

  /* WORKSHEET (expanded inside card) */
  .worksheet {
    background: var(--bg);
  }
  .ws-actions {
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    border-bottom: 1px solid var(--line);
  }
  .ws-actions .btn {
    padding: 6px 12px;
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
    display: inline-block;
    text-decoration: none;
    color: var(--ink);
  }
  .ws-actions .btn:hover { border-color: var(--ink); }
  .ws-actions .btn.primary {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .ws-actions .btn.danger { color: var(--danger); border-color: var(--danger); }
  .ws-actions .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ws-actions .actions-right { display: flex; gap: 6px; }

  .worksheet-body {
    background: white;
    border: 1px solid var(--line);
    margin: 12px;
  }

  /* HEADER STRIP */
  .ws-header {
    display: grid;
    grid-template-columns: 1fr 460px;
    border-bottom: 1px solid var(--line);
    padding: 10px 14px;
    align-items: center;
    gap: 14px;
  }
  .ws-title h2 { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
  .ws-title .co { font-size: 10px; color: var(--ink-3); letter-spacing: 0.05em; }
  .ws-dates {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr auto 1fr;
    column-gap: 8px;
    row-gap: 4px;
    font-size: 12px;
    align-items: center;
  }
  .ws-dates .lbl { color: var(--ink); white-space: nowrap; }
  .ws-dates input {
    border: 1px solid var(--line);
    padding: 3px 6px;
    background: var(--field-bg);
    font-family: inherit;
    font-size: 12px;
    width: 100%;
    font-variant-numeric: tabular-nums;
  }

  /* META BAR */
  .ws-meta-bar {
    display: grid;
    grid-template-columns: 0.9fr 1.6fr 0.7fr 0.7fr;
    border-bottom: 1px solid var(--line);
  }
  .ws-meta-bar .field {
    padding: 6px 10px;
    border-right: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    min-width: 0;
    white-space: nowrap;
  }
  .ws-meta-bar .field:last-child { border-right: none; }
  .ws-meta-bar .lbl { color: var(--ink-3); white-space: nowrap; flex-shrink: 0; }
  .ws-meta-bar input, .ws-meta-bar select {
    flex: 1;
    min-width: 0;
    width: 100%;
    border: 1px solid var(--line);
    padding: 3px 6px;
    background: var(--field-bg);
    font-family: inherit;
    font-size: 12px;
  }
  .ws-meta-bar .id-display {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  /* CLIENT BOX */
  .ws-client-box { border-bottom: 1px solid var(--line); }
  .ws-client-box .row { display: grid; border-bottom: 1px solid var(--line); }
  .ws-client-box .row:last-child { border-bottom: none; }
  .ws-client-box .cell {
    padding: 6px 10px;
    border-right: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    min-height: 30px;
  }
  .ws-client-box .cell:last-child { border-right: none; }
  .ws-client-box .lbl {
    color: var(--ink);
    font-weight: 600;
    white-space: nowrap;
    min-width: 56px;
  }
  .ws-client-box .row-client { grid-template-columns: 1fr 220px; }
  .ws-client-box .row-product { grid-template-columns: 1fr 220px; }
  .ws-client-box .cell { min-width: 0; }
  .ws-client-box input {
    flex: 1;
    width: 100%;
    border: 1px solid var(--line);
    padding: 3px 6px;
    background: var(--field-bg);
    font-family: inherit;
    font-size: 12px;
    min-width: 0;
  }

  /* SECTION (社内 / 外注) */
  .ws-section { border-bottom: 1px solid var(--line); }
  .section-title {
    background: var(--section-bg);
    color: var(--section-fg);
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .ws-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ws-table th, .ws-table td {
    border: 1px solid var(--line);
    padding: 4px 8px;
    background: white;
    vertical-align: top;
  }
  .ws-table thead th {
    background: var(--label-bg);
    font-weight: 600;
    color: var(--ink);
    font-size: 11px;
  }
  .ws-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .ws-table td input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink);
    padding: 0;
  }
  .ws-table td input.num { text-align: right; font-variant-numeric: tabular-nums; }
  .ws-table tr.subrow td {
    background: #fafaf9;
    color: var(--ink-3);
    font-size: 11px;
    font-style: italic;
  }
  .ws-table tr.subrow td .label-internal {
    font-style: normal;
    font-weight: 600;
    color: var(--ink-3);
    margin-right: 8px;
    border: 1px solid var(--line);
    padding: 0 6px;
    border-radius: 2px;
    font-size: 10px;
  }
  /* breakdown editor (in edit mode) */
  .breakdown-edit-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    align-items: center;
    font-style: normal;
  }
  .breakdown-edit-row > .group {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  /* 計算メモは仕込×掛率と同じ行に横並び */
  .breakdown-edit-row > .group.memo-group {
    flex: 1;
    min-width: 0;
  }
  .breakdown-edit-row > .group.memo-group input.inline-memo {
    flex: 1;
    min-width: 180px;
    width: 100%;
  }
  .ws-table tr.subrow input.inline-num,
  .ws-table tr.subrow input.inline-memo {
    border: 1px solid var(--line) !important;
    background: white !important;
    padding: 2px 5px !important;
    font-style: normal !important;
    font-size: 12px !important;
    font-weight: normal !important;
    color: var(--ink) !important;
  }
  .ws-table tr.subrow input.inline-num {
    width: 80px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .ws-table tr.subrow input.inline-memo {
    flex: 1;
    min-width: 240px;
  }
  .breakdown-edit-row .calc-result {
    color: var(--ink-2);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* row-level remove button */
  .row-remove-btn {
    border: 1px solid var(--line);
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    padding: 0 8px;
    border-radius: 2px;
    color: var(--danger);
  }
  .row-remove-btn:hover { background: var(--danger); color: white; }
  .add-opt-link {
    border: none;
    background: transparent;
    color: var(--link);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    padding: 2px 0;
    text-decoration: underline;
  }
  .ws-table tr.subtotal td {
    background: var(--label-bg);
    font-weight: 600;
  }
  .ws-table .col-bunkin { width: 110px; }
  .ws-table .col-bunkin-del { width: 24px; padding: 0 !important; text-align: center; }
  .ws-table .col-tanto { width: 90px; }
  .ws-table .col-num { width: 90px; }
  .ws-table td.col-content,
  .ws-table td.col-content input,
  .ws-table tr:not(.subrow):not(.subtotal):not(.unselected-row):not(.add-opt-row) td.num,
  .ws-table tr:not(.subrow):not(.subtotal):not(.unselected-row):not(.add-opt-row) td input.num {
    font-size: 14px;
    font-weight: 600;
  }
  /* unselected option rows: grayed out, smaller, italic */
  .ws-table tr.unselected-row td,
  .ws-table tr.unselected-row td input {
    color: var(--ink-3) !important;
    font-weight: normal !important;
    font-size: 12px !important;
    font-style: italic !important;
  }
  .ws-table tr.unselected-row { background: #fafaf9; }
  .opt-checkbox-label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .opt-checkbox-label input[type=checkbox] {
    flex-shrink: 0;
    cursor: pointer;
    width: 14px;
    height: 14px;
  }
  .opt-checkbox-label .opt-content-input { flex: 1; min-width: 0; }
  .ws-table tr.add-opt-row td {
    background: #fafaf9 !important;
    padding: 4px 12px !important;
    text-align: left;
  }
  .add-meisai-btn {
    border: 1px dashed var(--color-primary);
    background: white;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 3px;
    color: var(--color-primary);
    font-weight: 600;
  }
  .add-meisai-btn:hover { background: var(--color-pale-blue); }
  .add-meisai-btn.dup-btn {
    border-color: var(--ink-3);
    color: var(--ink-3);
  }
  .add-meisai-btn.dup-btn:hover { background: var(--line); }
  .ws-table tr.add-unit-row td {
    padding: 5px 10px !important;
    background: var(--bg) !important;
    border-top: 1px dashed var(--line) !important;
  }
  .ws-table tr.add-unit-row .add-item-row {
    margin: 3px 0;
  }
  .add-item-row {
    text-align: center;
    margin: 12px 0;
  }
  /* 2ブロック目以降の先頭行: 上に区切り線 */
  .ws-table tr.block-first-row td,
  .ws-table tr.block-first-row th {
    border-top: 2px solid var(--color-primary);
  }
  /* 区分セル内レイアウト */
  .bunkin-cell-inner {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 4px;
    height: 100%;
  }
  /* ユニット削除ボタン */
  .unit-delete-btn {
    background: none;
    border: 1px solid #ccc;
    color: var(--ink-3);
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 2px;
    cursor: pointer;
    align-self: flex-end;
    line-height: 1.4;
  }
  .unit-delete-btn:hover { background: #fee; color: var(--color-accent); border-color: var(--color-accent); }
  /* 備考欄（社内セクション末尾） */
  .meisai-biko-row {
    margin: 4px 0 8px;
  }
  .meisai-biko-input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--line);
    background: white;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    border-radius: 2px;
  }
  .meisai-biko-view {
    padding: 6px 8px;
    font-size: 13px;
    color: var(--ink-2);
  }
  .grand-subtotal {
    display: grid;
    grid-template-columns: 1fr 110px 110px;
    gap: 12px;
    padding: 10px 14px;
    background: var(--label-bg);
    font-size: 14px;
    border: 1px solid var(--line);
    margin-top: 8px;
  }
  .grand-subtotal-label {
    text-align: right;
    font-weight: 600;
    color: var(--ink-2);
  }
  .grand-subtotal-value {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  /* 仕込経費 + 掛率 のスタック表示 */
  .cost-with-markup { display: block; }
  .cost-with-markup .cost-input { width: 100%; text-align: right; }
  .cost-with-markup .markup-line {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 3px;
    margin-top: 2px;
    font-size: 10px;
    color: var(--ink-3);
  }
  .cost-with-markup .markup-input {
    width: 44px;
    font-size: 10px !important;
    text-align: right;
    padding: 0 2px !important;
    font-weight: normal !important;
    border: 1px solid var(--line) !important;
  }
  .markup-display {
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 1px;
    text-align: right;
  }
  /* 仕様 + URL 行 */
  .spec-row td {
    border-top: none !important;
    padding: 4px 12px 6px 8px !important;
    background: #eef2fa !important;
    font-size: 11px !important;
    font-style: normal !important;
    color: var(--ink-2) !important;
  }
  .spec-row .spec-content {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px 12px;
    line-height: 1.5;
  }
  .spec-row .spec-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-3);
    border: 1px solid var(--line);
    padding: 0 6px;
    border-radius: 2px;
    background: white;
  }
  .spec-row .spec-text { color: var(--ink); }
  /* ===== 相見積セクション（編集中のみ表示・コンパクト） ===== */
  .aimitsumori-section {
    border-top: 1px dashed var(--line);
    background: #fafaf8;
    overflow: hidden;
  }
  .aimitsumori-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 8px;
    background: var(--label-bg);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .aimitsumori-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--ink-2);
    white-space: nowrap;
  }
  .aimitsumori-spec-bar {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex: 1;
    font-size: 10px;
    color: var(--ink-3);
  }
  .aimitsumori-spec-bar span {
    background: white;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 0 4px;
  }
  .aimitsumori-spec-bar .spec-empty {
    color: var(--ink-3);
    font-style: italic;
    border: none;
    background: none;
    padding: 0;
  }
  .aimitsumori-btn {
    font-size: 10px;
    padding: 1px 7px;
    border: 1px solid var(--color-primary);
    border-radius: 2px;
    background: white;
    color: var(--color-primary);
    cursor: pointer;
    white-space: nowrap;
  }
  .aimitsumori-btn:hover { background: var(--color-primary); color: white; }
  .aimitsumori-btn--del { border-color: var(--color-accent); color: var(--color-accent); }
  .aimitsumori-btn--del:hover { background: var(--color-accent); color: white; }
  .aimitsumori-import-panel {
    padding: 4px 8px;
    border-bottom: 1px solid var(--line);
    background: white;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .aimitsumori-import-panel textarea {
    flex: 1;
    height: 48px;
    font-size: 10px;
    font-family: monospace;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 2px 4px;
    resize: vertical;
  }
  .aimitsumori-import-btn {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--color-primary);
    border-radius: 2px;
    background: var(--color-primary);
    color: white;
    cursor: pointer;
    white-space: nowrap;
  }
  /* 相見積グリッド（table廃止→CSS Grid） */
  .aimitsumori-grid {
    border-top: 1px solid var(--line);
    font-size: 11px;
  }
  .ai-row {
    display: grid;
    grid-template-columns: 120px 44px 90px 1fr 36px;
    height: 26px;
    align-items: center;
    border-bottom: 1px solid var(--line);
    background: white;
  }
  .ai-row.ai-header {
    background: var(--label-bg);
    font-weight: 600;
    font-size: 10px;
    color: var(--ink-2);
  }
  .ai-row.ai-selected { background: #f0f7ec; }
  .ai-row > span {
    padding: 0 6px;
    overflow: hidden;
    white-space: nowrap;
    height: 100%;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--line);
    box-sizing: border-box;
  }
  .ai-row > span:last-child { border-right: none; }
  .ai-co { gap: 2px; }
  .ai-co input { flex: 1; min-width: 0; }
  .ai-remove-btn {
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--ink-3);
    cursor: pointer;
    font-size: 11px;
    padding: 0 2px;
    line-height: 1;
  }
  .ai-remove-btn:hover { color: var(--color-accent); }
  .ai-co-link { flex-shrink: 0; font-size: 10px; color: var(--link); text-decoration: none; }
  .ai-co-link:hover { text-decoration: underline; }
  .ai-tk { justify-content: center; }
  .ai-pr { justify-content: flex-end; font-variant-numeric: tabular-nums; }
  .ai-ad { justify-content: center; }
  .ai-row input:not([type=checkbox]) {
    width: 100%;
    height: 20px;
    padding: 0 2px;
    box-sizing: border-box;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 11px;
    color: var(--ink);
  }
  .ai-pr input { text-align: right; }
  .ai-row input[type=checkbox] { cursor: pointer; width: 13px; height: 13px; }
  .ai-add-row { border-top: 1px dashed var(--line); padding: 2px 6px; background: #fafaf8; }
  .ai-add-row-btn {
    border: none; background: none; cursor: pointer;
    font-size: 10px; color: var(--color-primary); padding: 0;
  }
  .ai-add-row-btn:hover { text-decoration: underline; }
  .aimitsumori-footer {
    padding: 3px 8px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .aimitsumori-apply-btn {
    font-size: 10px;
    padding: 1px 10px;
    border: 1px solid var(--color-accent);
    border-radius: 2px;
    background: white;
    color: var(--color-accent);
    cursor: pointer;
    font-weight: 600;
  }
  .aimitsumori-apply-btn:hover { background: var(--color-accent); color: white; }
  .aimitsumori-toast { font-size: 10px; color: var(--ink-3); }
  /* 適合表示（Claude が記入、読み取り専用） */
  .tekigo-display {
    font-size: 12px;
    font-weight: 700;
    display: block;
    text-align: center;
    line-height: 20px;
  }
  .tekigo-display.maru    { color: #3a9; }
  .tekigo-display.sankaku { color: #c90; }
  .tekigo-display.batsu   { color: var(--color-accent); }
  .tekigo-display.empty   { color: var(--ink-3); font-size: 11px; font-weight: normal; }
  /* 相見積行（テーブル内 tr のラッパー） */
  .aimitsumori-unit-row .aimitsumori-section {
    margin: 0;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }
  .aimitsumori-grid a {
    color: var(--link);
    text-decoration: underline;
    font-size: 11px;
  }
  .aimitsumori-grid a:hover { opacity: .75; }
  /* 一覧画面: 仕込情報を請求額セルに表示 */
  .shikomi-note {
    display: block;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 2px;
    white-space: nowrap;
  }
  .spec-row a {
    color: var(--link);
    text-decoration: underline;
    font-size: 11px;
    word-break: break-all;
  }
  .spec-row input.spec-input,
  .spec-row input.url-input {
    border: 1px solid var(--line) !important;
    background: white !important;
    padding: 2px 6px !important;
    font-size: 11px !important;
    font-style: normal !important;
    color: var(--ink) !important;
    font-weight: normal !important;
  }
  .spec-row input.spec-input { flex: 2; min-width: 200px; }
  .spec-row input.url-input { flex: 1; min-width: 180px; }
  .spec-row input.spec-mini-input,
  .spec-row select.spec-mini-select {
    border: 1px solid var(--line) !important;
    background: white !important;
    padding: 2px 6px !important;
    font-size: 11px !important;
    font-style: normal !important;
    color: var(--ink) !important;
    font-weight: normal !important;
    width: 110px;
  }
  .spec-row select.spec-mini-select { width: auto; min-width: 80px; }
  .spec-row .group {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--ink-3);
  }
  .spec-row .group b {
    font-weight: 600;
    color: var(--ink-3);
    margin-right: 2px;
  }

  /* TOTALS */
  .ws-totals {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    border-bottom: 1px solid var(--line);
  }
  .ws-totals .cell {
    padding: 8px 12px;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .ws-totals .cell:last-child { border-right: none; }
  .ws-totals .cell .lbl {
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 10px;
  }
  .ws-totals .cell .val {
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .ws-totals .cell.profit-rate { background: var(--color-warm-cream); }
  .ws-totals .cell.profit-amount { background: var(--color-yellow); }
  .ws-totals .cell.gaichu-total { background: var(--color-teal); color: white; }
  .ws-totals .cell.gaichu-total .lbl { color: rgba(255,255,255,0.85); }
  .ws-totals .cell.bill-net { background: var(--color-pale-blue); }
  .ws-totals .cell.bill-gross { background: var(--color-primary); color: white; }
  .ws-totals .cell.bill-gross .lbl { color: rgba(255,255,255,0.85); }

  /* BIKO */
  .ws-biko {
    padding: 8px 14px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    font-size: 12px;
    align-items: start;
  }
  .ws-biko .lbl { font-weight: 600; padding-top: 4px; }
  .ws-biko textarea {
    width: 100%;
    min-height: 40px;
    border: 1px solid var(--line);
    padding: 4px 8px;
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    background: var(--field-bg);
  }

  /* MEMO PANEL */
  .ws-memo-panel {
    margin: 12px;
    border: 1px solid var(--line);
    background: white;
  }
  .ws-memo-panel h3 {
    background: var(--section-bg);
    color: var(--section-fg);
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .memo-block { border-bottom: 1px solid var(--line); padding: 10px 14px; }
  .memo-block:last-child { border-bottom: none; }
  .memo-block .memo-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .memo-block .memo-head .label { font-weight: 600; color: var(--ink); font-size: 12px; }
  .memo-block .memo-note { font-size: 11px; color: var(--ink-3); }
  .memo-block table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .memo-block table th, .memo-block table td { border: 1px solid var(--line); padding: 3px 6px; background: white; }
  .memo-block table th { background: var(--label-bg); font-weight: 600; font-size: 10px; }
  .memo-block table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .memo-block .formula { font-size: 10px; color: var(--ink-3); margin-top: 4px; }

  /* TickTick */
  .ticktick-info {
    margin: 12px;
    padding: 8px 14px;
    background: white;
    border: 1px solid var(--line);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ticktick-info .tt-title { font-weight: 600; color: var(--ink); }
  .ticktick-info .tt-meta { color: var(--ink-3); font-size: 11px; }

  /* READ-ONLY MODE: hide input borders, make read like text */
  .worksheet.read-only input,
  .worksheet.read-only select,
  .worksheet.read-only textarea {
    border-color: transparent !important;
    background: transparent !important;
    pointer-events: none;
  }
  .worksheet.read-only .ws-table td input { border-color: transparent !important; }
  .worksheet.read-only label { cursor: default; }
  /* 採用チェックボックスだけは read-only でも操作可（即保存される） */
  .worksheet.read-only input[type=checkbox][data-meisai-select] {
    pointer-events: auto !important;
    cursor: pointer;
  }
  .worksheet.read-only .opt-checkbox-label {
    cursor: default;
  }
  .worksheet.read-only .opt-checkbox-label input[type=checkbox] {
    cursor: pointer;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 4px;
    font-size: 14px;
    z-index: 200;
  }
  .empty { text-align: center; padding: 60px 20px; color: var(--ink-3); }

  /* SUMMARY BAR */
  #jobs-summary .ws-totals {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  /* FOLDER TABS */
  .main-tabs {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    border-bottom: 2px solid var(--line-2);
    margin-bottom: 28px;
  }
  .main-tab {
    padding: 12px 36px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    background: none;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--ink-4);
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
  }
  .main-tab.active {
    background: var(--bg);
    color: var(--ink);
    border-color: var(--line-2);
    border-bottom: 2px solid var(--bg);
    margin-bottom: -2px;
    padding-bottom: 16px;
  }
  .main-tab:hover:not(.active) { color: var(--ink-2); }

  /* ====== MINUTES TAB ====== */
  .minutes-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .minutes-search { flex: 1; min-width: 200px; }
  .minutes-search input {
    width: 100%;
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 14px;
    font-family: inherit;
  }
  .minutes-filter select {
    padding: 9px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 13px;
    font-family: inherit;
    min-width: 140px;
  }
  .btn-add-minute {
    padding: 9px 16px;
    border: none;
    border-radius: 4px;
    background: var(--color-navy);
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-add-minute:hover { opacity: 0.85; }
  .btn-add-minute:disabled { opacity: 0.4; cursor: not-allowed; }

  .minutes-list { display: flex; flex-direction: column; gap: 8px; }
  .minute-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.1s;
  }
  .minute-card:hover { border-color: var(--ink); }
  .minute-card-head {
    display: flex;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--ink-3);
  }
  .minute-source-icon {
    font-size: 14px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .minute-datetime {
    font-variant-numeric: tabular-nums;
    color: var(--ink-2);
    font-weight: 600;
  }
  .minute-client {
    color: var(--color-primary);
    font-weight: 600;
  }
  .minute-job-no {
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .minute-job-no.is-new {
    color: var(--color-coral);
    font-weight: 600;
  }
  .minute-card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .minute-card-summary {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .minute-card-counts {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--ink-3);
  }
  .minute-card-counts span.has { color: var(--color-navy); font-weight: 600; }
  .minute-card-counts span.applied { color: var(--color-green); font-weight: 600; }

  /* MINUTE MODAL (詳細・追加) */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,20,30,0.45);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-backdrop.show { display: flex; }
  .modal-card {
    background: var(--card-bg);
    border-radius: 8px;
    width: 100%;
    max-width: 760px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--ink-3);
    line-height: 1;
    padding: 4px 10px;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-body { padding: 20px; }
  .modal-foot {
    padding: 14px 20px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-btn {
    padding: 9px 18px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card-bg);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-btn.primary {
    background: var(--color-navy);

    border-color: var(--color-navy);
    font-weight: 600;
  }
  .modal-btn.primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;

  .modal-btn.danger { color: var(--color-pink); }
  .modal-btn:hover:not(:disabled) { border-color: var(--ink); }

  .source-picker {
    display: grid;

    margin-bottom: 16px;

  .source-btn {
    padding: 14px;

    background: var(--card-bg);

    font-family: inherit;
    text-align: left;
    display: flex;
    gap: 12px;
    align-items: center;

  .source-btn:hover { border-color: var(--ink); background: var(--bg); }

  .source-btn .icon { font-size: 22px; }
  .source-btn .label { font-size: 13px; font-weight: 600; }
  .source-btn .desc { font-size: 11px; color: var(--ink-3); display: block; margin-top: 2px; }

  .form-row {
    display: flex;

  .form-row label {
    font-size: 12px;

  .form-row input,
  .form-row select,
  .form-row textarea {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--line);

    font-family: inherit;

  .form-row textarea {
    min-height: 200px;

  .digest-section {
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 4px;

  .digest-section h4 {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-2);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .digest-section h4 .count {
    color: var(--ink-4);

  .digest-section ul { list-style: none; }
  .digest-section li {
    font-size: 13px;
    line-height: 1.6;

    color: var(--ink);

  .digest-section li:first-child { border-top: none; }
  .digest-section li .meta {
    display: block;
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 2px;

  .digest-section.empty li { color: var(--ink-4); font-style: italic; }

  .applied-banner {
    background: var(--color-cream);
    border-left: 3px solid var(--color-green);
    padding: 8px 12px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--ink-2);
  }

  .processing-banner {
    background: #fff7e0;
    border-left: 3px solid var(--color-yellow);
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--ink-2);
  }

  .job-minute-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-left: 8px;
    padding: 2px 8px;
    background: var(--color-secondary);
    color: var(--color-navy);
    font-size: 11px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    vertical-align: middle;
  }
  .job-minute-badge:hover { background: var(--color-primary); color: white; }

  /* CLIENT LIST */
  .client-list { display: flex; flex-direction: column; gap: 6px; }
  .client-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .client-summary-row {
    display: grid;
    grid-template-columns: 2fr 1.8fr 2.4fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .client-summary-row:hover { background: #faf9f6; }
  .client-name { font-size: 14px; font-weight: 700; }
  .client-kana { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .client-contact { font-size: 12px; color: var(--ink-2); }
  .client-email { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .client-latest { font-size: 12px; }
  .client-latest .job-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .client-latest .job-name { color: var(--ink-2); }
  .client-latest .job-amount { font-weight: 700; font-variant-numeric: tabular-nums; margin-left: auto; }
  .client-latest .no-job { color: var(--ink-4); font-size: 11px; }
  .client-chevron { color: var(--ink-3); font-size: 12px; transition: transform 0.15s; }
  .client-card.expanded .client-chevron { transform: rotate(180deg); }

  .client-detail {
    border-top: 1px solid var(--line);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    background: #faf9f6;
    font-size: 12px;
  }
  .client-detail-section { display: flex; flex-direction: column; gap: 10px; }
  .client-detail-label {
    font-size: 10px;
    color: var(--ink-3);

    margin-bottom: 2px;
  }
  .client-detail-value { color: var(--ink-2); line-height: 1.6; }
  .client-jobs-mini { display: flex; flex-direction: column; gap: 4px; }
  .client-jobs-mini a {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-2);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: 1px solid var(--line);

  }
  .client-jobs-mini a:hover { color: var(--ink); }
  .client-jobs-mini .job-no { color: var(--ink-3); font-size: 11px; min-width: 48px; }
  .client-jobs-mini .job-amount-mini { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 600; }

  /* FOOTER */
  footer {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--line-2);
    font-size: 11px;
    color: var(--ink-3);
    text-align: center;
  }

  @media (max-width: 820px) {

    .ws-client-box .row-spec { grid-template-columns: repeat(3, 1fr); }
    .ws-totals { grid-template-columns: repeat(2, 1fr); }
    .ws-header { grid-template-columns: 1fr !important; gap: 8px !important; }
  }
</style>
</head>
<body>
<main>

<header class="hero">
  <div class="title-block" style="margin-top:28px;">
    <h1><img src="assets/logo.svg" alt="IDEARNEST" style="height:42px; width:auto; display:block; margin-bottom:6px;"></h1>
    <div class="sub" id="hero-sub">会社名</div>
  </div>
</header>

<nav class="main-tabs">
  <button class="main-tab active" data-tab="jobs">WORKSHEET</button>
  <button class="main-tab" data-tab="clients">CLIENTS</button>
  <button class="main-tab" data-tab="minutes">MINUTES</button>
  <div class="meta-block" style="margin-left:auto; padding-bottom:6px;">
    <strong id="today-date"></strong>
    <span id="generated-at"></span>
    <div id="server-status" class="server-status offline">静的モード（編集不可）</div>
    <button id="btn-sync-tt" style="display:none; margin-top:4px; font-size:11px; padding:2px 10px; border:1px solid var(--line); border-radius:3px; cursor:pointer; background:var(--card-bg);" title="TickTick から最新の工程を取得して WORKSHEET を更新">TickTick 同期</button>
  </div>
</nav>

<section id="tab-jobs">
  <div class="controls">
    <div class="controls-top">
      <div class="search-box">
        <input type="text" id="search" placeholder="キーワード検索（スペース区切りでAND）…">
      </div>
      <button id="btn-adv" class="btn-adv">絞り込み</button>
      <button class="btn-new-job" id="btn-new-job" disabled title="サーバ起動中のみ使用可">＋ 新規 WORKSHEET</button>
    </div>
    <div class="adv-panel" id="adv-panel" style="display:none"></div>
    <div class="pills" id="status-pills"></div>

  <div class="jobs" id="jobs-list"></div>
  <div id="jobs-summary"></div>
</section>

<section id="tab-clients" style="display:none">

</section>

<section id="tab-minutes" style="display:none">
  <div class="minutes-toolbar">
    <div class="minutes-search">
      <input type="text" id="minutes-search" placeholder="議事録を検索（タイトル・サマリ・タグ）…">
    </div>
    <div class="minutes-filter">
      <select id="minutes-filter-client">
        <option value="">クライアント：全て</option>
      </select>
    </div>
    <div class="minutes-filter">
      <select id="minutes-filter-source">
        <option value="">入力ソース：全て</option>
        <option value="line">LINE</option>
        <option value="email">メール</option>
        <option value="phone">電話（録音なし）</option>
        <option value="meeting">打ち合わせ（録音なし）</option>
        <option value="audio">録音あり（電話/打ち合わせ）</option>
        <option value="manual">手入力</option>
      </select>

    <button class="btn-add-minute" id="btn-add-minute" disabled title="サーバ起動中のみ使用可">＋ 議事録追加</button>
  </div>
  <div class="minutes-list" id="minutes-list"></div>
  <div id="minutes-summary" style="text-align:center; color:var(--ink-3); font-size:12px; padding:20px;"></div>
</section>

<!-- 議事録 詳細・追加 モーダル -->
<div class="modal-backdrop" id="minute-modal">
  <div class="modal-card">
    <div class="modal-head">
      <h2 id="minute-modal-title">議事録</h2>

<datalist id="bunkin-options">
  <option value="デザイン費">
  <option value="印刷費">
  <option value="撮影費">
  <option value="制作費">
  <option value="原稿費">
  <option value="その他">
</datalist>

<datalist id="media-options">
  <option value="データ">
  <option value="印刷物">
  <option value="WEB">
  <option value="その他">
</datalist>

<footer id="footer"></footer>

</main>

<script src="data.js"></script>
<script>
(function () {
  let D = window.IDEARNEST;
  if (!D) {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">data.js が見つかりません。<br>ターミナルで <code>cd ~/IDEARNEST && python3 scripts/build_data_js.py</code> を実行してください。</div>';
    return;
  }

  const STATUS_VALUES = ['見積', '受注', '請求OK', '請求書発行済', '入金確認済', '中止'];
  const STAFF = (D.settings?.staff || []).map(s => s.name);

  const STATE = {
    search: '',
    statusFilter: '進行中',
    expandedKey: null,
    editingKey: null,
    draft: null,
    serverOnline: false,
    isNewJob: false,
    // 詳細絞り込み
    showAdvanced: false,
    clientFilter: '',
    billingMonthFrom: '',
    billingMonthTo: '',
    staffFilter: '',
    mediaFilter: '',
  };

  // ====== HELPERS ======
  const $ = (sel) => document.querySelector(sel);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtYen = (n) => n == null || n === 0 ? '' : '¥' + Number(n).toLocaleString('ja-JP');
  const fmtDate = (s) => s ? s.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$1/$2/$3') : '';
  const calcTaxIncl = (n, rate=10) => n == null ? null : Math.round(n * (1 + rate/100));
  const jobKey = (j) => j.制作番号 != null ? `n_${j.制作番号}` : `t_${j.TickTick_task_id || j.製品名}`;
  const jobIsActive = (j) => j.状態 === '受注' || j.状態 === '見積' || j.状態 === '請求OK';
  const sumMeisai = (j) => {
    let total = 0;
    (j.明細 || []).forEach(m => {
      (m.選択肢 || []).forEach(opt => { if (opt.選択) total += (opt.金額 || 0); });
    });
    return total;
  };
  const sumMeisaiTaxIncl = (j) => {
    let total = 0;
    (j.明細 || []).forEach(m => {
      const rate = m.税率 || 10;
      (m.選択肢 || []).forEach(opt => {
        if (opt.選択) total += (calcTaxIncl(opt.金額, rate) || 0);
      });
    });
    return total;
  };
  const sumGaichuCost = (j) => {
    let t = 0;
    (j.外注 || []).forEach(g => (g.選択肢 || []).forEach(o => { if (o.選択) t += (o.仕込経費 || 0); }));
    return t;
  };
  const sumGaichuBill = (j) => {
    let t = 0;
    (j.外注 || []).forEach(g => (g.選択肢 || []).forEach(o => { if (o.選択) t += (o.請求額 || 0); }));
    return t;
  };
  const sumGaichuBillTax = (j) => {
    let t = 0;
    (j.外注 || []).forEach(g => (g.選択肢 || []).forEach(o => { if (o.選択) t += (calcTaxIncl(o.請求額, 10) || 0); }));
    return t;
  };
  const clone = (o) => JSON.parse(JSON.stringify(o));
  function thisMonth() {
    const d = new Date();
    return `${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  // ====== SERVER ======
  // data.js を再取得してUIを再描画する共通ヘルパー
  async function reloadData() {
    const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
    eval(newScript);
    D = window.IDEARNEST;
    renderHeader();
    renderStats();
    renderPills();
    renderJobs();
    renderMinutes();
  }

  async function syncTickTick(showToastMsg = false) {
    const btn = document.getElementById('btn-sync-tt');
    if (btn) { btn.disabled = true; btn.textContent = '同期中...'; }
    try {
      const r = await fetch('/api/regenerate', {method:'POST', body: '{}'});
      if (r.ok) {
        await reloadData();
        if (showToastMsg) showToast('TickTick 工程を同期しました', 'success');
      }
    } catch (e) { /* サーバなしの場合は無視 */ }
    if (btn) { btn.disabled = false; btn.textContent = 'TickTick 同期'; }
  }

  async function checkServer() {
    try {
      const r = await fetch('/api/regenerate', {method:'POST', body: '{}'});
      STATE.serverOnline = r.ok;
      if (r.ok) {
        // 再生成完了後 data.js を再取得して最新 TickTick 工程を表示
        await reloadData();
      }
    } catch (e) { STATE.serverOnline = false; }
    renderServerStatus();
    // 同期ボタンはサーバ稼働時のみ表示
    const syncBtn = document.getElementById('btn-sync-tt');
    if (syncBtn) syncBtn.style.display = STATE.serverOnline ? 'inline-block' : 'none';
  }
  function renderServerStatus() {
    const el = $('#server-status');
    if (STATE.serverOnline) {
      el.className = 'server-status online';
      el.textContent = 'サーバ稼働中（編集可）';
    } else {
      el.className = 'server-status offline';
      el.textContent = '静的モード — 編集には python3 scripts/serve.py 起動';
    }
    const newBtn = document.getElementById('btn-new-job');
    if (newBtn) newBtn.disabled = !STATE.serverOnline;
    const addMinBtn = document.getElementById('btn-add-minute');
    if (addMinBtn) addMinBtn.disabled = !STATE.serverOnline;
  }

  function showToast(msg, color='normal') {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    if (color === 'error') t.style.background = '#b32424';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  // ====== RENDER: HEADER / STATS / PILLS ======
  function renderHeader() {
    const now = new Date();
    const days = ['日','月','火','水','木','金','土'];
    $('#today-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
    $('#generated-at').textContent = 'data: ' + (D.generated_at || '').replace('T',' ');
    $('#hero-sub').textContent = D.settings?.company?.name || '会社名';
  }
  function renderStats() { /* 廃止 */ }
  function renderPills() {
    const jobs = D.jobs || [];
    const counts = {
      '進行中': jobs.filter(jobIsActive).length,
      '見積': jobs.filter(j=>j.状態==='見積').length,
      '受注': jobs.filter(j=>j.状態==='受注').length,
      '請求OK': jobs.filter(j=>j.状態==='請求OK').length,
      '請求書発行済': jobs.filter(j=>j.状態==='請求書発行済').length,
      '入金確認済': jobs.filter(j=>j.状態==='入金確認済').length,
      '中止': jobs.filter(j=>j.状態==='中止').length,
      'すべて': jobs.length,
    };
    const order = ['進行中','見積','受注','請求OK','請求書発行済','入金確認済','中止','すべて'];
    $('#status-pills').innerHTML = order.map(k => `
      <button class="pill ${STATE.statusFilter===k?'active':''}" data-filter="${k}">${k}<span class="count">${counts[k]}</span></button>
    `).join('');
    $('#status-pills').querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => { STATE.statusFilter = btn.dataset.filter; renderPills(); renderJobs(); });
    });
  }

  // ====== JOBS ======

  // 案件の全テキストを平坦化（AND検索用）
  function jobText(j) {
    const parts = [
      j.制作番号, j.クライアント, j.末端クライアント, j.製品名,
      j.担当, j.媒体, j.状態, j.請求月, j.サイズ, j.数量,
      j.用紙, j.加工, j.色数, j.現在の状況,
    ];
    for (const m of (j.明細 || []))
      for (const o of (m.選択肢 || [])) parts.push(o.内容, o.備考);
    for (const g of (j.外注 || [])) {
      parts.push(g.発注先);
      for (const o of (g.選択肢 || [])) parts.push(o.内容, o.サイズ, o.数量, o.用紙, o.媒体);
    }
    return parts.map(v => String(v ?? '')).join(' ').toLowerCase();
  }

  function applyFilter(jobs) {
    let f = jobs;
    // ステータスフィルター
    if (STATE.statusFilter === '進行中') f = f.filter(jobIsActive);
    else if (STATE.statusFilter !== 'すべて') f = f.filter(j => j.状態 === STATE.statusFilter);
    // キーワード AND 検索
    if (STATE.search) {
      const tokens = STATE.search.toLowerCase().split(/\s+/).filter(Boolean);
      f = f.filter(j => { const t = jobText(j); return tokens.every(tk => t.includes(tk)); });
    }
    // 詳細絞り込み
    if (STATE.clientFilter)      f = f.filter(j => j.クライアント === STATE.clientFilter);
    if (STATE.billingMonthFrom)  f = f.filter(j => (j.請求月 || '') >= STATE.billingMonthFrom);
    if (STATE.billingMonthTo)    f = f.filter(j => (j.請求月 || '') <= STATE.billingMonthTo);
    if (STATE.staffFilter)       f = f.filter(j => j.担当 === STATE.staffFilter);
    if (STATE.mediaFilter)       f = f.filter(j => j.媒体 === STATE.mediaFilter);
    return f.slice().sort((a,b) => (b.制作番号||-1) - (a.制作番号||-1));
  }

  function hasAdvFilter() {
    return !!(STATE.clientFilter || STATE.billingMonthFrom || STATE.billingMonthTo || STATE.staffFilter || STATE.mediaFilter);
  }

  function renderAdvPanel() {
    const panel = document.getElementById('adv-panel');
    if (!panel) return;
    const allJobs = D.jobs || [];
    const uniq = (arr) => [...new Set(arr.filter(Boolean))].sort();
    const clients = uniq(allJobs.map(j => j.クライアント));
    const staffs  = uniq(allJobs.map(j => j.担当));
    const medias  = uniq(allJobs.map(j => j.媒体));

    const sel = (id, arr, val) =>
      `<select id="${id}" class="adv-select">
        <option value="">（すべて）</option>
        ${arr.map(v => `<option value="${escapeHtml(v)}"${v===val?' selected':''}>${escapeHtml(v)}</option>`).join('')}
      </select>`;

    panel.innerHTML = `<div class="adv-row">
      <div class="adv-group">
        <span class="adv-label">クライアント</span>
        ${sel('adv-client', clients, STATE.clientFilter)}
      </div>
      <div class="adv-group">
        <span class="adv-label">請求月</span>
        <div class="adv-month-range">
          <input type="text" id="adv-mfrom" class="adv-input" value="${escapeHtml(STATE.billingMonthFrom)}" placeholder="26.04">
          <span class="adv-month-sep">〜</span>
          <input type="text" id="adv-mto" class="adv-input" value="${escapeHtml(STATE.billingMonthTo)}" placeholder="26.06">
        </div>
      </div>
      <div class="adv-group">
        <span class="adv-label">担当</span>
        ${sel('adv-staff', staffs, STATE.staffFilter)}
      </div>
      <div class="adv-group">
        <span class="adv-label">媒体</span>
        ${sel('adv-media', medias, STATE.mediaFilter)}
      </div>
      ${hasAdvFilter() ? `<button class="adv-clear" id="adv-clear">クリア</button>` : ''}
    </div>`;

    // セレクト → パネル再描画あり

  // 仕様・製品名からカテゴリを判定
  function detectPrintCategory(spec, productName) {
    const text = [spec.用紙||'', spec.サイズ||'', spec.加工||'', spec.媒体||'', productName||''].join(' ');
    if (/封筒|角2|長3|角3/.test(text)) return '封筒';
    if (/チラシ|フライヤー|flyer/i.test(text)) return 'チラシ';
    if (/名刺|meishi/i.test(text)) return '名刺';
    if (/ポスター|poster/i.test(text)) return 'ポスター';
    return 'デフォルト';
  }

  // renderJobs後にフォーカスを復元するヘルパー
  function renderJobsKeepFocus() {
    const ae = document.activeElement;
    let focusKey = null, focusAttr = null, selStart = null, selEnd = null;
    if (ae) {
      for (const a of ['meisai','opt','field','gopt','gaichu']) {
        if (ae.dataset && ae.dataset[a] !== undefined) {
          focusKey = ae.dataset[a]; focusAttr = `data-${a}`; break;
        }
      }
      selStart = ae.selectionStart; selEnd = ae.selectionEnd;
    }
    renderJobs();
    if (focusKey) {
      const el = document.querySelector(`[${focusAttr}="${CSS.escape(focusKey)}"]`);
      if (el) { el.focus(); try { el.setSelectionRange(selStart, selEnd); } catch(e) {} }
    }
  }
  let _autoCalcTimer = null;
  function scheduleAutoCalcRender() {
    clearTimeout(_autoCalcTimer);
    _autoCalcTimer = setTimeout(renderJobsKeepFocus, 500);
  }

  function renderJobs() {
    const jobs = applyFilter(D.jobs || []);
    const list = $('#jobs-list');
    if (jobs.length === 0) {
      list.innerHTML = '<div class="empty">該当する案件がありません</div>';
    } else {
      list.innerHTML = jobs.map(j => renderJobCard(j)).join('');
      // Summary click → toggle expand
      list.querySelectorAll('.job-card-summary').forEach(el => {
        el.addEventListener('click', () => {
          const card = el.closest('.job-card');
          const key = card.dataset.key;
          if (STATE.editingKey && STATE.editingKey !== key) {
            if (!confirm('編集中の案件があります。破棄してこの案件を開きますか？')) return;
            STATE.editingKey = null;
            STATE.draft = null;
          }
          STATE.expandedKey = (STATE.expandedKey === key) ? null : key;
          renderJobs();
        });
      });
      // Wire up worksheet event handlers
      jobs.forEach(j => {
        const k = jobKey(j);
        if (STATE.expandedKey === k) wireWorksheet(j);
      });
      // 議事録バッジ・リンク・ジャンプボタンのイベント
      list.querySelectorAll('.job-minute-badge').forEach(b => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const jobNo = b.dataset.jobNo;
          jumpToMinutesByJob(jobNo);
        });
      });
      list.querySelectorAll('.job-minute-link').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          openMinuteDetail(a.dataset.mid);
        });
      });
      list.querySelectorAll('.btn-jump-minutes-job').forEach(b => {
        b.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          jumpToMinutesByJob(b.dataset.jobNo);
        });
      });
      list.querySelectorAll('.btn-jump-minutes-client').forEach(b => {
        b.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          jumpToMinutesByClient(b.dataset.clientId);
        });
      });
      // 進行履歴「さらに見る」ボタン
      list.querySelectorAll('.tl-expand-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const jobNo = btn.dataset.tlExpand;
          const restEl = document.getElementById(`tl-rest-${jobNo}`);

  function renderSummary(jobs) {
    const el = document.getElementById('jobs-summary');
    if (!el) return;
    if (jobs.length === 0) { el.innerHTML = ''; return; }

    let billNet = 0, billGross = 0, gaichuCost = 0;
    for (const j of jobs) {
      billNet    += sumMeisai(j)       + sumGaichuBill(j);
      billGross  += sumMeisaiTaxIncl(j) + sumGaichuBillTax(j);
      gaichuCost += sumGaichuCost(j);
    }
    const grossProfit = billNet - gaichuCost;
    const grossMargin = billNet > 0 ? (grossProfit / billNet * 100) : null;

    const fmt  = n => '¥' + Number(n).toLocaleString('ja-JP');
    const fmtP = n => n == null ? '—' : n.toFixed(1) + '%';

    el.innerHTML = `<div class="ws-totals">
      <div class="cell profit-rate"><span class="lbl">粗利率</span><span class="val">${fmtP(grossMargin)}</span></div>
      <div class="cell profit-amount"><span class="lbl">粗利益</span><span class="val">${fmt(grossProfit)}</span></div>
      <div class="cell gaichu-total"><span class="lbl">外注経費合計</span><span class="val">${fmt(gaichuCost)}</span></div>
      <div class="cell bill-net"><span class="lbl">請求合計／税抜</span><span class="val">${fmt(billNet)}</span></div>
      <div class="cell bill-gross"><span class="lbl">請求合計／税込</span><span class="val">${fmt(billGross)}</span></div>
    </div>`;
  }

  // TickTick 達成率を小さな円グラフ（SVGドーナツ）で表現
  function progressRing(done, total) {
    if (!total) return '';
    const pct = done / total;
    const r = 10;
    const circ = +(2 * Math.PI * r).toFixed(2);
    const filled = +(circ * pct).toFixed(2);
    const strokeStyle = pct >= 1 ? 'stroke:#2a7a4a' : 'stroke:var(--color-primary)';
    const tip = `${done}/${total} 工程完了（${Math.round(pct * 100)}%）`;
    return `<div class="progress-ring-wrap" title="${tip}">
      <svg width="24" height="24" viewBox="0 0 28 28" aria-hidden="true">
        <circle cx="14" cy="14" r="${r}" fill="none" stroke="#e0e0e0" stroke-width="4"/>
        <circle cx="14" cy="14" r="${r}" fill="none" style="${strokeStyle}" stroke-width="4"
          stroke-dasharray="${filled} ${circ}"
          stroke-linecap="round"
          transform="rotate(-90 14 14)"/>
      </svg>
      <div class="progress-ring-label">${done}/${total}</div>
    </div>`;
  }

    // 折りたたみカードの「現在の工程」表示

  function renderJobMinutes(j) {
    const jobNo = j.制作番号 || '';

    // j.メモ を進行ログエントリに変換
    const memoEntries = (j.メモ || []).map(m => ({
      type: 'memo',
      date: typeof m === 'string' ? '' : (m.日付 || ''),
      time: '',
      text: typeof m === 'string' ? m : (m.内容 || m.text || ''),
    })).filter(e => e.text.trim());

    // 議事録エントリ
    const mins = getMinutesByJob(jobNo);
    const minuteEntries = mins.map(m => ({
      type: 'minute',
      date: m.date || '',
      time: m.time || '',
      text: m.title || '(無題)',
      mid: m.id,
      source: m.source_type,
      sourceMeta: m.source_meta,
      summary: (m.summary || '').slice(0, 50),
    }));

    // 新しい順にソート
    const all = [...memoEntries, ...minuteEntries].sort((a, b) => {
      const da = (a.date + a.time).replace(/\D/g, '');
      const db = (b.date + b.time).replace(/\D/g, '');
      return db.localeCompare(da);
    });

    const PREVIEW = 3;
    const renderEntry = (e) => {
      if (e.type === 'memo') {
        return `<div class="tl-item tl-memo">
          <span class="tl-date">${escapeHtml(e.date)}</span>
          <span class="tl-dot"></span>
          <span class="tl-text">${escapeHtml(e.text)}</span>
        </div>`;
      } else {
        return `<a href="#" class="tl-item tl-minute job-minute-link" data-mid="${escapeHtml(e.mid)}">
          <span class="tl-date">${escapeHtml(e.date)}${e.time ? ' ' + escapeHtml(e.time) : ''}</span>
          <span class="tl-dot minute"></span>
          ${sourceBadge(e.source, e.sourceMeta)}
          <span class="tl-text">${escapeHtml(e.text)}</span>
          ${e.summary ? `<span class="tl-summary">${escapeHtml(e.summary)}</span>` : ''}
        </a>`;
      }
    };

    const preview = all.slice(0, PREVIEW).map(renderEntry).join('');
    const rest    = all.length > PREVIEW ? all.slice(PREVIEW).map(renderEntry).join('') : '';
    const moreBtn = rest ? `
      <div class="tl-more">
        <button class="tl-expand-btn" data-tl-expand="${jobNo}">さらに ${all.length - PREVIEW} 件 ▼</button>
        <div class="tl-rest" id="tl-rest-${jobNo}" style="display:none">${rest}</div>
      </div>` : '';

    const empty = all.length === 0
      ? '<span class="tl-empty">進行履歴はまだありません</span>' : '';

    return `<div class="job-timeline" data-tl-job="${jobNo}">
      <div class="tl-header">
        <strong class="tl-title">進行履歴（${all.length}件）</strong>
        <button type="button" class="btn-jump-minutes-client" data-client-id="${escapeHtml(j.クライアント || '')}">このクライアントの全記録を見る</button>
      </div>
      ${empty}${preview}${moreBtn}
    </div>`;
  }
