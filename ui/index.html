  // ====== WORKSHEET (FM-style, expanded inside card) ======
  function renderWorksheet(jobOrig) {
    const isEditing = STATE.editingKey === jobKey(jobOrig);
    const j = isEditing ? STATE.draft : jobOrig;

    const meisaiSubtotal = sumMeisai(j);
    const meisaiTaxIncl = sumMeisaiTaxIncl(j);
    const gaichuCost = sumGaichuCost(j);
    const gaichuBill = sumGaichuBill(j);
    const gaichuBillTax = sumGaichuBillTax(j);
    const billNet = meisaiSubtotal + gaichuBill;
    const billGross = meisaiTaxIncl + gaichuBillTax;
    const profit = billNet - gaichuCost;
    const profitRate = billNet > 0 ? (profit / billNet * 100) : 0;

    // 全ブロックを1つのtableにまとめる。ヘッダーは共通1行のみ
    const meisaiLen = (j.明細 || []).length;
    const meisaiAllRows = (j.明細 || []).map((m, i) => {
      const opts = m.選択肢 || [];
      const breakdown = m.内訳_社内 || {};
      const hasBreakdown = breakdown.仕込み経費 != null || breakdown.掛率 != null || breakdown.計算メモ;

      // 区分セルのrowspan: 選択肢行数 + breakdown行1行
      // （編集中は常に+1、閲覧中はbreakdownがある時だけ+1）
      const extraRowspan = isEditing ? 2 : (hasBreakdown ? 1 : 0);

      // 各選択肢を行に展開
      const optRows = opts.map((opt, k) => {
        const isFirst = k === 0;
        const isSelected = !!opt.選択;
        const removeBtn = isEditing && opts.length > 1
          ? `<button class="row-remove-btn" data-opt-remove="${i}.${k}" title="この選択肢を削除">×</button>`
          : '';
        const checkbox = `<input type="checkbox" data-meisai-select="${i}.${k}" ${isSelected ? 'checked' : ''} title="採用">`;
        const contentCell = isEditing
          ? `<label class="opt-checkbox-label">${checkbox}<input data-opt="${i}.${k}.内容" class="opt-content-input" value="${escapeHtml(opt.内容||'')}" placeholder="内容">${removeBtn}</label>`
          : `<label class="opt-checkbox-label">${checkbox}<span class="opt-content-input">${escapeHtml(opt.内容||'')}</span></label>`;
        // 区分セル: 最初の行のみ表示。rowspan = 選択肢行 + breakdown行
        const deleteUnitBtn = isEditing && meisaiLen > 1
          ? `<button class="unit-delete-btn" data-meisai-delete="${i}" title="このユニットを削除">×</button>`
          : '';
        const bunkinCell = isFirst
          ? `<td class="col-bunkin" rowspan="${opts.length + extraRowspan}"><div class="bunkin-cell-inner"><input data-meisai="${i}.区分" list="bunkin-options" value="${escapeHtml(m.区分||'')}" placeholder="区分">${deleteUnitBtn}</div></td>`
          : '';
        // 2ブロック目以降の先頭行にブロック区切り線（編集中のみ）
        const trClass = [
          isSelected ? '' : 'unselected-row',
          (isEditing && i > 0 && isFirst) ? 'block-first-row' : ''
        ].filter(Boolean).join(' ');
        return `
          <tr class="${trClass}">
            ${bunkinCell}
            <td class="col-content">${contentCell}</td>
            <td><input class="num" data-opt="${i}.${k}.数量" value="${opt.数量??''}"></td>
            <td><input class="num" data-opt="${i}.${k}.単価" value="${opt.単価??''}"></td>
            <td class="num">${isEditing ? `<input class="num" data-opt="${i}.${k}.金額" value="${opt.金額??''}">` : fmtYen(opt.金額)}</td>
          </tr>`;
      }).join('');

      // 内訳_社内 行: colspan=4（区分列は rowspan で上から延びてくる）
      let breakdownRow = '';
      if (isEditing) {
        const sk = breakdown.仕込み経費 ?? '';
        const ka = breakdown.掛率 ?? '';
        const me = breakdown.計算メモ ?? '';
        const calcResult = (breakdown.仕込み経費 != null && breakdown.掛率 != null)
          ? `<span class="calc-result">＝ ${fmtYen(breakdown.仕込み経費 * breakdown.掛率)}</span>` : '';
        breakdownRow = `<tr class="subrow"><td colspan="4">
          <div class="breakdown-edit-row">
            <span class="group">仕込
              <input data-meisai="${i}.内訳_社内.仕込み経費" class="num inline-num" type="number" value="${sk}" placeholder="0">
            </span>
            × <span class="group">掛率
              <input data-meisai="${i}.内訳_社内.掛率" class="num inline-num" type="number" step="0.1" value="${ka}" placeholder="2.0">
            </span>
            ${calcResult}
            <span class="group memo-group">計算メモ
              <input data-meisai="${i}.内訳_社内.計算メモ" class="inline-memo" value="${escapeHtml(me)}" placeholder="自由入力">
            </span>
          </div>
        </td></tr>`;
      } else if (hasBreakdown) {
        const parts = [];
        if (breakdown.仕込み経費 != null) parts.push(`仕込 <strong>${fmtYen(breakdown.仕込み経費)}</strong>`);
        if (breakdown.掛率 != null) parts.push(`掛率 <strong>×${breakdown.掛率}</strong>`);
        const calc = (breakdown.仕込み経費 != null && breakdown.掛率 != null)
          ? `＝ <strong>${fmtYen(breakdown.仕込み経費 * breakdown.掛率)}</strong>` : '';
        breakdownRow = `<tr class="subrow"><td colspan="4">
          ${parts.join(' × ')} ${calc}
          ${breakdown.計算メモ ? '— ' + escapeHtml(breakdown.計算メモ) : ''}
        </td></tr>`;
      }

      const meisaiUnitAddRow = isEditing
        ? `<tr class="add-unit-row"><td colspan="4"><div class="add-item-row">
            <button class="add-meisai-btn" data-meisai-insert="${i}">＋ 項目を追加</button>
            <button class="add-meisai-btn dup-btn" data-meisai-dup-at="${i}">＋ 項目を複製</button>
          </div></td></tr>`
        : '';
      return `${optRows || `<tr><td colspan="5" style="padding:12px; text-align:center; color:var(--ink-3); font-style:italic;">明細未入力</td></tr>`}${breakdownRow}${meisaiUnitAddRow}`;
    }).join('');

    const meisaiRows = meisaiLen === 0
      ? '<div style="padding:14px; text-align:center; color:var(--ink-3); font-style:italic; background:white; border:1px solid var(--line);">明細未入力</div>'
      : `<table class="ws-table">
          <thead><tr>
            <th class="col-bunkin">区分</th><th>内容</th>
            <th class="col-num">数量</th><th class="col-num">単価</th>
            <th class="col-num">請求額</th>
          </tr></thead>
          <tbody>${meisaiAllRows}</tbody>
        </table>`;
    const meisaiAddBtn = isEditing && meisaiLen === 0
      ? `<div class="add-item-row"><button class="add-meisai-btn" data-meisai-add>＋ 項目を追加</button></div>`
      : '';
    const bikoField = isEditing
      ? `<div class="meisai-biko-row"><input class="meisai-biko-input" data-field="備考" value="${escapeHtml(j.備考||'')}" placeholder="備考（自由記述）"></div>`
      : (j.備考 ? `<div class="meisai-biko-row meisai-biko-view">${escapeHtml(j.備考)}</div>` : '');

    // 外注もユニットシステムで統一（社内と同構造）
    // テーブル列: 発注先 | 外注作業概略 | 数量 | 単価 | 仕込額 | 請求額 (6列)
    // 仕込経費は列表示 + breakdown subrow (編集中) で管理
    const gaichuLen = (j.外注 || []).length;

    const gaichuAllRows = (j.外注 || []).map((g, i) => {
      const opts = g.選択肢 || [];
      const specOpt = opts[0] || {};

      // rowspan計算: コンテンツ行 + breakdown行(編集中のみ) + 仕様行 + 相見積行
      const hasBd = isEditing;
      const hasSp = isEditing || (specOpt.媒体 || specOpt.サイズ || specOpt.数量 || specOpt.加工 || specOpt.用紙 || specOpt.厚さ || specOpt.納期);
      const rowspan = opts.length + (hasBd ? 1 : 0) + (hasSp ? 1 : 0) + (isEditing ? 2 : 0); // 相見積行+add-unit-rowは編集中のみ

      // 相見積ユニットデータ（外注ユニット単位）
      // null/undefined = 非表示（追加ボタン表示）、配列 = 表示（削除ボタン表示）
      const hasAimitsu = g.相見積もり != null;
      const aimitsuUnitRows = hasAimitsu ? (g.相見積もり || []) : [];
      const aimitsuSpecParts = [specOpt.媒体, specOpt.サイズ, specOpt.数量, specOpt.用紙, specOpt.厚さ, specOpt.納期, specOpt.加工].filter(Boolean);
      const aimitsuCategory = detectPrintCategory(specOpt, j.製品名);
      const aimitsuUrlMap = AIMITSU_URL_TABLE[aimitsuCategory] || AIMITSU_URL_TABLE['デフォルト'];

      const deleteUnitBtn = isEditing && gaichuLen > 1
        ? `<button class="unit-delete-btn" data-gaichu-delete="${i}" title="このユニットを削除">×</button>`
        : '';
      // 一覧画面は <span> のみ（placeholder 非表示・空なら空白）
      const vendorCell = isEditing
        ? `<td class="col-bunkin-del" rowspan="${rowspan}">${deleteUnitBtn}</td>`
        : `<td class="col-bunkin" rowspan="${rowspan}"><div class="bunkin-cell-inner">${escapeHtml(g.発注先||'')}</div></td>`;

      const optRows = opts.map((opt, k) => {
        const isFirst = k === 0;
        const isSelected = !!opt.選択;
        const removeBtn = isEditing && opts.length > 1
          ? `<button class="row-remove-btn" data-gopt-remove="${i}.${k}" title="削除">×</button>`
          : '';
        const checkbox = `<input type="checkbox" data-gaichu-select="${i}.${k}" ${isSelected ? 'checked' : ''} title="採用">`;
        const contentCell = isEditing
          ? `<label class="opt-checkbox-label">${checkbox}<input data-gopt="${i}.${k}.内容" class="opt-content-input" value="${escapeHtml(opt.内容||'')}" placeholder="外注作業概略">${removeBtn}</label>`
          : `<label class="opt-checkbox-label">${checkbox}<span class="opt-content-input">${escapeHtml(opt.内容||'')}</span></label>`;
        // 一覧画面では選択状態によらず同じスタイル（unselected-row は編集中のみ）
        const trClass = [
          (isEditing && !isSelected) ? 'unselected-row' : '',
          (isEditing && i > 0 && isFirst) ? 'block-first-row' : ''
        ].filter(Boolean).join(' ');
        return `
          <tr class="${trClass}">
            ${isFirst ? vendorCell : ''}
            <td class="col-content">${contentCell}</td>
            <td class="num">${isEditing ? `<input class="num" data-gopt="${i}.${k}.数量" value="${escapeHtml(opt.数量||'')}">` : (opt.数量 ?? '')}</td>
            <td class="num">${isEditing ? `<input class="num" data-gopt="${i}.${k}.単価" value="${opt.単価??''}">` : (opt.単価 != null ? fmtYen(opt.単価) : '')}</td>
            <td class="num">${opt.仕込経費 != null ? fmtYen(opt.仕込経費) : ''}</td>
            <td class="num">${isEditing ? `<input class="num" data-gopt="${i}.${k}.請求額" value="${opt.請求額??''}">` : fmtYen(opt.請求額)}</td>
          </tr>`;
      }).join('');

      // 仕込×掛率 breakdown行（コンテンツ行の直下、仕様行の上）
      // colspan=4（発注先セルがrowspanで左列を占有、残り4列）
      let breakdownRow = '';
      if (isEditing) {
        const sk = specOpt.仕込経費 ?? '';
        const ka = specOpt.掛率 ?? '';
        const calcResult = (specOpt.仕込経費 != null && specOpt.掛率 != null)
          ? `<span class="calc-result">＝ ${fmtYen(specOpt.仕込経費 * specOpt.掛率)}</span>` : '';
        const gme = specOpt.計算メモ ?? '';
        breakdownRow = `<tr class="subrow"><td colspan="5">
          <div class="breakdown-edit-row">
            <span class="group">仕込
              <input data-gopt="${i}.0.仕込経費" class="num inline-num" type="number" value="${sk}" placeholder="0">
            </span>
            × <span class="group">掛率
              <input data-gopt="${i}.0.掛率" class="num inline-num" type="number" step="0.1" value="${ka}" placeholder="—">
            </span>
            ${calcResult}
            <span class="group memo-group">メモ
              <input data-gopt="${i}.0.計算メモ" class="inline-memo" value="${escapeHtml(gme)}" placeholder="自由入力">
            </span>
          </div>
        </td></tr>`;
      }
      // 一覧画面では breakdownRow は出さない（仕込額は列で表示）

      // 仕様行: ユニットに1つ（先頭optの仕様を参照, colspan=5）
      let specRow = '';
      if (isEditing) {
        specRow = `<tr class="subrow spec-row"><td colspan="5"><div class="spec-content">
            <span class="spec-label">仕様</span>
            <span class="group">媒体 <input class="spec-mini-input" data-gopt="${i}.0.媒体" value="${escapeHtml(specOpt.媒体||'')}" placeholder="印刷物"></span>
            <span class="group">仕上サイズ
              <input class="spec-mini-input" data-gopt="${i}.0.サイズ" value="${escapeHtml(specOpt.サイズ||'')}" list="spec-size-${i}" placeholder="角2">
              <datalist id="spec-size-${i}">
                <option value="A4">
                <option value="A3">
                <option value="B5">
                <option value="B4">
                <option value="角2">
                <option value="長3">
              </datalist>
            </span>
            <span class="group">数量 <input class="spec-mini-input" data-gopt="${i}.0.数量" value="${escapeHtml(String(specOpt.数量??''))}" placeholder="100枚"></span>
            <span class="group">用紙 <input class="spec-mini-input" data-gopt="${i}.0.用紙" value="${escapeHtml(specOpt.用紙||'')}" placeholder="白色封筒"></span>
            <span class="group">厚さ <input class="spec-mini-input" data-gopt="${i}.0.厚さ" value="${escapeHtml(specOpt.厚さ||'')}" placeholder="80g"></span>
            <span class="group">納期
              <select class="spec-mini-select" data-gopt="${i}.0.納期">
                <option value="">—</option>
                <option value="最短" ${specOpt.納期==='最短'?'selected':''}>最短</option>
                <option value="3営業日" ${specOpt.納期==='3営業日'?'selected':''}>3営業日</option>
                <option value="4営業日" ${specOpt.納期==='4営業日'?'selected':''}>4営業日</option>
                <option value="5営業日" ${specOpt.納期==='5営業日'?'selected':''}>5営業日</option>
                <option value="6営業日" ${specOpt.納期==='6営業日'?'selected':''}>6営業日</option>
                <option value="9営業日" ${specOpt.納期==='9営業日'?'selected':''}>9営業日</option>
                <option value="10営業日" ${specOpt.納期==='10営業日'?'selected':''}>10営業日</option>
                <option value="最長" ${specOpt.納期==='最長'?'selected':''}>最長</option>
              </select>
            </span>
            <span class="group">加工 <input class="spec-mini-input" data-gopt="${i}.0.加工" value="${escapeHtml(specOpt.加工||'')}" placeholder="オンデマンド"></span>
          </div></td></tr>`;
      } else {
        const parts = [];
        if (specOpt.媒体)  parts.push(`<span><b>媒体</b> ${escapeHtml(specOpt.媒体)}</span>`);
        if (specOpt.サイズ) parts.push(`<span><b>仕上サイズ</b> ${escapeHtml(specOpt.サイズ)}</span>`);
        if (specOpt.数量)  parts.push(`<span><b>数量</b> ${escapeHtml(String(specOpt.数量))}</span>`);
        if (specOpt.用紙)  parts.push(`<span><b>用紙</b> ${escapeHtml(specOpt.用紙)}</span>`);
        if (specOpt.厚さ)  parts.push(`<span><b>厚さ</b> ${escapeHtml(specOpt.厚さ)}</span>`);
        if (specOpt.納期)  parts.push(`<span><b>納期</b> ${escapeHtml(specOpt.納期)}</span>`);
        if (specOpt.加工)  parts.push(`<span><b>加工</b> ${escapeHtml(specOpt.加工)}</span>`);
        if (parts.length) {
          specRow = `<tr class="subrow spec-row"><td colspan="5"><div class="spec-content">${parts.join('')}</div></td></tr>`;
        }
      }

      // 相見積行（編集中のみ表示）
      const aimitsuContent = !hasAimitsu ? '' : `
        <div class="aimitsumori-import-panel" style="display:none;" data-aimitsu-import-panel="${i}">
          <textarea data-aimitsu-json="${i}" placeholder='{"相見積もり結果":[{"会社":"プリントパック","仕込額":2980,"納期":"9営業日","適合":"○","備考":""},...]}'></textarea>
          <button class="aimitsumori-import-btn" data-act-aimitsu="import-json" data-aimitsu-idx="${i}">取込</button>
        </div>
        <div class="aimitsumori-grid">
          <div class="ai-row ai-header">
            <span class="ai-co">会社</span>
            <span class="ai-tk">適合</span>
            <span class="ai-pr">仕込額（税込）</span>
            <span class="ai-nt">備考</span>
            <span class="ai-ad">採用</span>
          </div>
          ${aimitsuUnitRows.map((row, ridx) => {
            const tekigoCls = {'○':'maru','△':'sankaku','×':'batsu'}[row.適合] || 'empty';
            const tekigoLabel = row.適合 || '—';
            return `<div class="ai-row${row.採用 ? ' ai-selected' : ''}">
              <span class="ai-co">
                <input data-aimitsu="${i}.${ridx}.会社" value="${escapeHtml(row.会社||'')}" placeholder="会社名">
                ${(row.URL || aimitsuUrlMap[row.会社]) ? `<a class="ai-co-link" href="${escapeHtml(row.URL || aimitsuUrlMap[row.会社])}" target="_blank" rel="noopener" title="${escapeHtml(row.会社)}のサイト">↗</a>` : ''}
                <button class="ai-remove-btn" data-aimitsu-remove="${i}.${ridx}" title="この行を削除">×</button>
              </span>
              <span class="ai-tk"><span class="tekigo-display ${tekigoCls}">${tekigoLabel}</span></span>
              <span class="ai-pr"><input data-aimitsu="${i}.${ridx}.仕込額" type="text" inputmode="numeric" value="${row.仕込額??''}" placeholder="0" style="text-align:right;"></span>
              <span class="ai-nt"><input data-aimitsu="${i}.${ridx}.備考" value="${escapeHtml(row.備考||'')}"></span>
              <span class="ai-ad"><input type="checkbox" data-aimitsu-adopt="${i}.${ridx}" ${row.採用?'checked':''}></span>
            </div>`;
          }).join('')}
          <div class="ai-add-row"><button class="ai-add-row-btn" data-act-aimitsu="add-row" data-aimitsu-idx="${i}">＋ 会社を追加</button></div>
        </div>
        <div class="aimitsumori-footer">
          <button class="aimitsumori-apply-btn" data-act-aimitsu="apply" data-aimitsu-idx="${i}">外注に反映</button>
          <span class="aimitsumori-toast" data-aimitsu-toast="${i}"></span>
        </div>`;

      const aimitsuRow = !isEditing ? '' : `<tr class="aimitsumori-unit-row">
        <td colspan="5" style="padding:0;border-top:none !important;background:white !important;">
          <div class="aimitsumori-section" data-aimitsu-unit="${i}">
            <div class="aimitsumori-header">
              <span class="aimitsumori-title">相見積</span>
              ${hasAimitsu ? `
                <span class="aimitsumori-spec-bar">
                  ${aimitsuSpecParts.length
                    ? aimitsuSpecParts.map(s => `<span>${escapeHtml(s)}</span>`).join('')
                    : '<span class="spec-empty">仕様を入力すると自動表示</span>'}
                </span>
                <button class="aimitsumori-btn" data-act-aimitsu="copy-prompt" data-aimitsu-idx="${i}">Claude に依頼</button>
                <button class="aimitsumori-btn" data-act-aimitsu="toggle-import" data-aimitsu-idx="${i}">JSON 取込</button>
                <button class="aimitsumori-btn aimitsumori-btn--del" data-act-aimitsu="remove-aimitsu" data-aimitsu-idx="${i}">削除</button>
              ` : `
                <button class="aimitsumori-btn" data-act-aimitsu="add-aimitsu" data-aimitsu-idx="${i}">追加</button>
              `}
            </div>
            ${aimitsuContent}
          </div>
        </td>
      </tr>`;

      const gaichuUnitAddRow = isEditing
        ? `<tr class="add-unit-row"><td colspan="5"><div class="add-item-row">
            <button class="add-meisai-btn" data-gaichu-insert="${i}">＋ 項目を追加</button>
            <button class="add-meisai-btn dup-btn" data-gaichu-dup-at="${i}">＋ 項目を複製</button>
          </div></td></tr>`
        : '';
      return `${optRows || `<tr><td colspan="6" style="padding:12px;text-align:center;color:var(--ink-3);font-style:italic;">明細未入力</td></tr>`}${breakdownRow}${specRow}${aimitsuRow}${gaichuUnitAddRow}`;
    }).join('');

    const gaichuRows = gaichuLen === 0 ? '' : gaichuAllRows;

    const memoBlocks = (j.内訳_社内のみ || []).map((m, i) => {
      const items = (m.items || []).map((it) => `
        <tr>
          <td>${fmtYen(it.制作費)}</td>
          <td>${escapeHtml(it.仕入業者||'')}</td>
          <td class="num">${it.部数 ?? ''}</td>
          <td class="num">${fmtYen(it.単価)}</td>
          <td class="num">${fmtYen(it.仕入価格)}</td>
          <td class="num">${it.掛率 ?? ''}</td>
          <td class="num">${fmtYen(it.売価)}</td>
          <td class="num">${fmtYen(it.売単価)}</td>
          <td class="num">${fmtYen(it.粗利)}</td>
        </tr>
      `).join('');
      return `
        <div class="memo-block">
          <div class="memo-head">
            <span class="label">■メモ${m.メモ番号 || (i+1)}</span>
            ${m.備考 ? `<span class="memo-note">${escapeHtml(m.備考)}</span>` : ''}
          </div>
          <table>
            <thead><tr>
              <th>制作費</th><th>仕入業者</th><th>部数</th><th>単価</th>
              <th>仕入価格</th><th>掛率</th><th>売価</th><th>売単価</th><th>粗利</th>
            </tr></thead>
            <tbody>${items}</tbody>
          </table>
          <div class="formula">※売価合計＝仕入価格×掛率＋制作費　／　売単価＝売価合計÷数量　／　粗利＝売価合計-仕入価格</div>
        </div>
      `;
    }).join('');

    return `
      <div class="worksheet ${isEditing?'':'read-only'}" data-key="${jobKey(j)}">
        <div class="ws-actions">
          <span style="font-size:11px; color:var(--ink-3);">クリックで折りたたむ ↑</span>
          <div class="actions-right">
            ${isEditing
              ? '<button class="btn danger" data-act="cancel">キャンセル</button><button class="btn primary" data-act="save">保存</button>'
              : `<button class="btn" data-act="edit">編集</button><a class="btn" href="estimate.html?id=${jobOrig.制作番号 != null ? jobOrig.制作番号 : (jobOrig.TickTick_task_id || '')}" target="_blank">見積書</a><a class="btn" href="invoice.html?id=${jobOrig.制作番号 != null ? jobOrig.制作番号 : (jobOrig.TickTick_task_id || '')}" target="_blank">請求書</a>`}
          </div>
        </div>

        <div class="worksheet-body">

          <header class="ws-header">
            <div class="ws-title">
              <h2>WORKSHEET</h2>
              <div class="co">WORKSHEET</div>
            </div>
            <div class="ws-dates">
              <span class="lbl">依頼日／</span><input data-field="依頼日" value="${escapeHtml(j.依頼日||'')}" placeholder="2026-04-15">
              <span class="lbl">見積日／</span><input data-field="見積日" value="${escapeHtml(j.見積日||'')}" placeholder="2026-04-15">
              <span class="lbl">納品日／</span><input data-field="納品日" value="${escapeHtml(j.納品日||'')}" placeholder="2026-04-15">
            </div>
          </header>

          <div class="ws-meta-bar">
            <div class="field">
              <span class="lbl">担当／</span>
              <select data-field="担当">
                ${['', ...STAFF].map(s => `<option ${j.担当===s?'selected':''} value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <span class="lbl">制作・請求番号／</span>
              <span class="id-display">ID ${j.制作番号 != null ? j.制作番号 : '撮影'}</span>
              ${j.種別==='撮影' ? '<span class="badge 撮影">撮影</span>' : ''}
              ${j.外注フラグ ? '<span class="badge 外注">外注</span>' : ''}
            </div>
            <div class="field">
              <span class="lbl">請求締日／</span>
              <input data-field="請求締日" value="${escapeHtml(j.請求締日||'')}">
            </div>
            <div class="field">
              <span class="lbl">請求月／</span>
              <input data-field="請求月" value="${escapeHtml(j.請求月||'')}" placeholder="26.04">
            </div>
          </div>

          <div class="ws-client-box">
            <div class="row row-client">

            <div class="cell gaichu-total"><span class="lbl">外注経費合計</span><span class="val">${fmtYen(gaichuCost)}</span></div>
            <div class="cell bill-net"><span class="lbl">請求合計／税抜</span><span class="val">${fmtYen(billNet)}</span></div>
            <div class="cell bill-gross"><span class="lbl">請求合計／税込</span><span class="val">${fmtYen(billGross)}</span></div>
          </div>

          <div class="ws-biko">
            <span class="lbl">備考</span>
            <textarea data-field="メモtext" placeholder="(備考なし)">${escapeHtml((j.メモ || []).map(m => typeof m === 'string' ? m : (m.text || m.内容 || '')).filter(Boolean).join('\n'))}</textarea>
          </div>

        </div>

        ${memoBlocks ? `<div class="ws-memo-panel"><h3>MEMO（社内・内訳計算）</h3>${memoBlocks}</div>` : ''}

        ${j.TickTick_title ? `
          <div class="ticktick-info">
            <span class="tt-title">TickTick: ${escapeHtml(j.TickTick_title)}</span>
            <span class="tt-meta">${escapeHtml(j.TickTick_task_id || '')}</span>
          </div>` : ''}

      </div>
    `;
  }

  // ====== QUICK PANEL イベント配線 ======
  function wireQuickPanel(jobOrig) {
    const k   = jobKey(jobOrig);
    const qp  = document.querySelector(`.quick-panel[data-qp-key="${k}"]`);
    if (!qp) return;

    // タスク折りたたみトグル
    const toggleEl = qp.querySelector(`[data-qp-toggle="${k}"]`);
    const listEl   = document.getElementById(`qp-tasks-${k}`);
    const chevEl   = document.getElementById(`qp-chev-${k}`);
    if (toggleEl && listEl) {
      toggleEl.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = listEl.style.display !== 'none';
        listEl.style.display = open ? 'none' : '';
        if (chevEl) chevEl.classList.toggle('open', !open);
      });
    }

    // 備考テキストエリア — blur 時に 現在の状況 を自動保存
    const memoEl = qp.querySelector(`[data-qp-memo="${k}"]`);
    const savedEl = document.getElementById(`qp-saved-${k}`);
    if (memoEl) {
      memoEl.addEventListener('click', (e) => e.stopPropagation());
      memoEl.addEventListener('blur', async () => {
        if (!STATE.serverOnline) return;
        const newVal = memoEl.value.trim();
        const orig = jobOrig.現在の状況 || '';
        if (newVal === orig) return;
        if (savedEl) savedEl.textContent = '保存中…';
        const updated = clone(jobOrig);
        updated.現在の状況 = newVal;
        updated.更新日 = new Date().toISOString().slice(0, 10);
        try {
          const res = await fetch('/api/job', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(updated)
          });
          if (res.ok) {
            const saved = await res.json();
            const idx = D.jobs.findIndex(j => jobKey(j) === k);
            if (idx >= 0) D.jobs[idx] = saved;
            if (savedEl) { savedEl.textContent = '保存済'; setTimeout(() => { if (savedEl) savedEl.textContent = ''; }, 2000); }
          }
        } catch(e) {
          if (savedEl) savedEl.textContent = '';
        }
      });
    }

    // 詳細編集 / 閉じる ボタン
    qp.querySelectorAll('[data-qp-act]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const act = btn.dataset.qpAct;
        if (act === 'open-ws') {
          if (!STATE.serverOnline) {
            showToast('編集にはサーバ起動が必要です（python3 scripts/serve.py）', 'error');
            return;
          }
          STATE.editingKey = k;
          STATE.draft = clone(jobOrig);
          renderJobs();
        } else if (act === 'close-ws') {
          STATE.editingKey = null;
          STATE.draft = null;
          renderJobs();
        }
      });
    });
  }

  function wireWorksheet(jobOrig) {
    const k = jobKey(jobOrig);
    const wsEl = document.querySelector(`.worksheet[data-key="${k}"]`);
    if (!wsEl) return;

    // Action buttons
    wsEl.querySelectorAll('[data-act]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const act = btn.dataset.act;
        if (act === 'edit') {
          if (!STATE.serverOnline) {
            showToast('編集にはサーバ起動が必要です（python3 scripts/serve.py）', 'error');
            return;
          }
          STATE.editingKey = k;
          STATE.draft = clone(jobOrig);
          renderJobs();
        } else if (act === 'cancel') {
          if (STATE.isNewJob) {
            D.jobs = D.jobs.filter(j => jobKey(j) !== STATE.editingKey);
            STATE.isNewJob = false;
          }
          STATE.editingKey = null;
          STATE.draft = null;
          renderJobs();
        } else if (act === 'save') {
          handleSave(jobOrig);
        }
      });
    });

    // Don't propagate clicks inside worksheet to summary
    wsEl.addEventListener('click', (e) => e.stopPropagation());

    // 共通: 即トグル＆即保存ハンドラ作成
    const makeInstantToggleHandler = (cb, kind, indices) => async () => {
      const editing = STATE.editingKey === k;
      const applyToggle = (target) => {
        if (kind === 'meisai') {
          const [mIdx, oIdx] = indices;
          target.明細[mIdx].選択肢[oIdx].選択 = cb.checked;
        } else if (kind === 'gaichu') {
          const [gIdx, oIdx] = indices;
          target.外注[gIdx].選択肢[oIdx].選択 = cb.checked;
        }
      };
      if (editing) { applyToggle(STATE.draft); renderJobs(); return; }
      if (!STATE.serverOnline) {
        showToast('サーバ未起動のため保存できません', 'error');
        cb.checked = !cb.checked;
        return;
      }
      const updated = clone(jobOrig);
      applyToggle(updated);
      try {
        const r = await fetch('/api/save', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(updated),
        });
        const jr = await r.json();
        if (!jr.ok) throw new Error(jr.error || 'failed');
        const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
        const fn = new Function(newScript + '; return window.IDEARNEST;');
        window.IDEARNEST = fn();
        Object.assign(D, window.IDEARNEST);
        renderStats();
        renderPills();
        renderJobs();
        const sel = kind === 'meisai'
          ? updated.明細[indices[0]].選択肢[indices[1]]
          : updated.外注[indices[0]].選択肢[indices[1]];
        const verb = cb.checked ? '採用に追加' : '採用から外し';
        showToast('「' + (sel.内容 || '') + '」を' + verb + '・保存しました');
      } catch (e) {
        showToast('保存失敗: ' + e.message, 'error');
        cb.checked = !cb.checked;
      }
    };

    // 社内・採用チェックボックス
    wsEl.querySelectorAll('[data-meisai-select]').forEach(cb => {
      const indices = cb.dataset.meisaiSelect.split('.').map(Number);
      cb.addEventListener('change', makeInstantToggleHandler(cb, 'meisai', indices));
    });
    // 外注・採用チェックボックス
    wsEl.querySelectorAll('[data-gaichu-select]').forEach(cb => {
      const indices = cb.dataset.gaichuSelect.split('.').map(Number);
      cb.addEventListener('change', makeInstantToggleHandler(cb, 'gaichu', indices));
    });

    // Live update fields if editing
    if (STATE.editingKey === k) {
      wsEl.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', () => {
          const fk = el.dataset.field;
          if (fk.startsWith('_')) return;
          let v = el.type === 'checkbox' ? el.checked : el.value;
          if (fk === 'メモtext') {
            STATE.draft.メモ = v.split('\n').filter(s => s.trim());
            return;
          }
          if (fk === '数量' && v !== '') v = Number(v);
          else if (v === '') v = null;
          STATE.draft[fk] = v;
        });
        // 媒体変更で外注の仕様欄レイアウトを再描画
        el.addEventListener('change', () => {
          if (el.dataset.field === '媒体') renderJobs();
        });
      });
      wsEl.querySelectorAll('[data-meisai]').forEach(el => {
        el.addEventListener('input', () => {
          const path = el.dataset.meisai.split('.');
          const idx = parseInt(path[0]);
          if (!STATE.draft.明細[idx]) return;
          let v = el.value;
          if (el.classList.contains('num') && v !== '') v = Number(v);
          else if (v === '') v = null;
          if (path.length === 2) {
            STATE.draft.明細[idx][path[1]] = v;
          } else if (path.length === 3) {
            STATE.draft.明細[idx][path[1]] = STATE.draft.明細[idx][path[1]] || {};
            STATE.draft.明細[idx][path[1]][path[2]] = v;
          }
          // 仕込 × 掛率 → 金額（請求額）→ 単価 の自動計算
          if (path.length === 3 && path[1] === '内訳_社内' && (path[2] === '仕込み経費' || path[2] === '掛率')) {
            const bd = STATE.draft.明細[idx].内訳_社内 || {};
            const sk = bd.仕込み経費, ka = bd.掛率;
            if (sk != null && ka != null) {
              const kin = Math.round(sk * ka);
              // 選択中の選択肢に金額・単価を自動入力
              (STATE.draft.明細[idx].選択肢 || []).forEach((opt, k) => {
                if (!opt.選択) return;
                opt.金額 = kin;
                if (opt.数量) opt.単価 = Math.round(kin / opt.数量 * 10) / 10;
                // DOMに直接反映（フォーカスを奪わない）
                const kinEl = wsEl.querySelector(`[data-opt="${idx}.${k}.金額"]`);
                if (kinEl) kinEl.value = kin;
                if (opt.数量) {
                  const tanEl = wsEl.querySelector(`[data-opt="${idx}.${k}.単価"]`);
                  if (tanEl) tanEl.value = opt.単価;
                }
              });
              // calc-resultも更新
              const calcEl = el.closest('.breakdown-edit-row')?.querySelector('.calc-result');
              if (calcEl) calcEl.textContent = `＝ ${fmtYen(kin)}`;
              scheduleAutoCalcRender(); // 合計欄を遅延再描画
            }
          }
        });
      });
      // 選択肢の各セル input
      wsEl.querySelectorAll('[data-opt]').forEach(el => {
        el.addEventListener('input', () => {
          const path = el.dataset.opt.split('.');
          const mIdx = parseInt(path[0]);
          const oIdx = parseInt(path[1]);
          const field = path[2];
          if (!STATE.draft.明細[mIdx]?.選択肢?.[oIdx]) return;
          let v = el.value;
          if (el.classList.contains('num') && v !== '') v = Number(v);
          else if (v === '') v = null;
          const opt = STATE.draft.明細[mIdx].選択肢[oIdx];
          opt[field] = v;
          // 数量 or 金額が変わったとき → 単価 = 金額 ÷ 数量 を自動計算
          if (field === '数量' || field === '金額') {
            const bd = STATE.draft.明細[mIdx].内訳_社内 || {};
            // 仕込が入っているとき: 数量が変わったら金額を再計算してから単価を出す
            if (field === '数量' && bd.仕込み経費 != null && bd.掛率 != null) {
              opt.金額 = Math.round(bd.仕込み経費 * bd.掛率);
              const kinEl = wsEl.querySelector(`[data-opt="${mIdx}.${oIdx}.金額"]`);
              if (kinEl) kinEl.value = opt.金額;
            }
            if (opt.金額 != null && opt.数量 != null && opt.数量 !== 0) {
              opt.単価 = Math.round(opt.金額 / opt.数量 * 10) / 10;
              const tanEl = wsEl.querySelector(`[data-opt="${mIdx}.${oIdx}.単価"]`);
              if (tanEl) tanEl.value = opt.単価;
              scheduleAutoCalcRender();
            }
          }
        });
      });
      // 選択肢の追加・削除
      wsEl.querySelectorAll('[data-opt-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const mIdx = parseInt(btn.dataset.optAdd);
          STATE.draft.明細[mIdx].選択肢 = STATE.draft.明細[mIdx].選択肢 || [];
          STATE.draft.明細[mIdx].選択肢.push({内容:'', 数量:null, 単価:null, 金額:0, 選択:false, 備考:''});
          renderJobs();
        });
      });
      wsEl.querySelectorAll('[data-opt-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const [mIdx, oIdx] = btn.dataset.optRemove.split('.').map(Number);
          STATE.draft.明細[mIdx].選択肢.splice(oIdx, 1);
          renderJobs();
        });
      });
      // ユニット削除
      wsEl.querySelectorAll('[data-meisai-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.meisaiDelete);
          STATE.draft.明細.splice(idx, 1);
          renderJobs();
        });
      });
      // 項目（明細グループ）の追加
      wsEl.querySelectorAll('[data-meisai-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          STATE.draft.明細 = STATE.draft.明細 || [];
          STATE.draft.明細.push({
            区分: '',
            税率: 10,
            備考: '',
            内訳_社内: { 仕込み経費: null, 掛率: null, 計算メモ: '' },
            選択肢: [{ 内容: '', 数量: null, 単価: null, 金額: 0, 選択: true, 備考: '' }]
          });
          renderJobs();
        });
      });
      // ブロック間「+ 項目を追加」（指定位置に挿入）
      wsEl.querySelectorAll('[data-meisai-insert]').forEach(btn => {
        btn.addEventListener('click', () => {
          STATE.draft.明細 = STATE.draft.明細 || [];
          const afterIdx = parseInt(btn.dataset.meisaiInsert);
          STATE.draft.明細.splice(afterIdx + 1, 0, {
            区分: '',
            税率: 10,
            備考: '',
            内訳_社内: { 仕込み経費: null, 掛率: null, 計算メモ: '' },
            選択肢: [{ 内容: '', 数量: null, 単価: null, 金額: 0, 選択: true, 備考: '' }]
          });
          renderJobs();
        });
      });
      wsEl.querySelectorAll('[data-gaichu]').forEach(el => {
        el.addEventListener('input', () => {
          const path = el.dataset.gaichu.split('.');
          const idx = parseInt(path[0]);
          if (!STATE.draft.外注[idx]) return;
          let v = el.value;
          if (el.classList.contains('num') && v !== '') v = Number(v);
          else if (v === '') v = null;
          STATE.draft.外注[idx][path[1]] = v;
        });
      });
      // 外注選択肢の各セル input
      wsEl.querySelectorAll('[data-gopt]').forEach(el => {
        el.addEventListener('input', () => {
          const path = el.dataset.gopt.split('.');
          const gIdx = parseInt(path[0]);
          const oIdx = parseInt(path[1]);
          const field = path[2];
          if (!STATE.draft.外注[gIdx]?.選択肢?.[oIdx]) return;
          let v = el.value;
          if (v === '') {
            v = null;
          } else if (el.classList.contains('num')) {
            const n = Number(v);
            v = isNaN(n) ? v : n; // NaN なら文字列のまま保持（例: "100枚"）
          }
          const opt = STATE.draft.外注[gIdx].選択肢[oIdx];
          opt[field] = v;
          // 仕込経費 × 掛率 = 請求額 を自動反映（請求額の手動変更も可）
          if (field === '仕込経費' || field === '掛率') {
            if (opt.仕込経費 != null && opt.掛率 != null) {
              opt.請求額 = Math.round(opt.仕込経費 * opt.掛率);
              const reqInput = wsEl.querySelector(`[data-gopt="${gIdx}.${oIdx}.請求額"]`);
              if (reqInput) reqInput.value = opt.請求額;
            }
          }
          // 請求額 ÷ 数量 = 単価 を自動反映（数量は "100枚" 等の文字列も考慮）
          if (field === '請求額' || field === '数量') {
            const kin = opt.請求額;
            const qty = parseFloat(String(opt.数量 ?? '').replace(/[^\d.]/g, ''));
            if (kin != null && qty && qty !== 0) {
              opt.単価 = Math.round(kin / qty * 10) / 10;
              const tanEl = wsEl.querySelector(`[data-gopt="${gIdx}.${oIdx}.単価"]`);
              if (tanEl) tanEl.value = opt.単価;
            }
          }
        });
        // blur時に合計を再計算
        el.addEventListener('change', () => {
          const field = el.dataset.gopt.split('.')[2];
          if (['仕込経費','掛率','請求額','数量'].includes(field)) renderJobs();
        });
      });
      // 外注ユニット削除
      wsEl.querySelectorAll('[data-gaichu-delete]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.gaichuDelete);
          STATE.draft.外注.splice(idx, 1);
          renderJobs();
        });
      });
      // 外注ユニット追加
      // 明細: ユニット複製（指定インデックスの直後に挿入）
      wsEl.querySelectorAll('[data-meisai-dup-at]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.meisaiDupAt);
          const src = JSON.parse(JSON.stringify(STATE.draft.明細[idx]));
          STATE.draft.明細.splice(idx + 1, 0, src);
          renderJobs();
        });
      });

      wsEl.querySelectorAll('[data-gaichu-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          STATE.draft.外注 = STATE.draft.外注 || [];
          STATE.draft.外注.push({
            発注先: '', 発注日: null, 備考: '',
            選択肢: [{
              内容: '', 仕込経費: null, 掛率: 2, 請求額: null,
              選択: true, 備考: '',
              媒体: '', サイズ: '', 数量: '', 用紙: '', 厚さ: '', 加工: '', 納期: ''
            }]
          });
          renderJobs();
        });
      });

      // 外注: ユニット新規挿入（指定インデックスの直後に挿入）
      wsEl.querySelectorAll('[data-gaichu-insert]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.gaichuInsert);
          STATE.draft.外注 = STATE.draft.外注 || [];
          STATE.draft.外注.splice(idx + 1, 0, {
            発注先: '', 発注日: null, 備考: '',
            選択肢: [{ 内容: '', 仕込経費: null, 掛率: 2, 請求額: null, 選択: true, 備考: '', 媒体: '', サイズ: '', 数量: '', 用紙: '', 厚さ: '', 加工: '', 納期: '' }]
          });
          renderJobs();
        });
      });
      // 外注: ユニット複製（指定インデックスの直後に挿入）
      wsEl.querySelectorAll('[data-gaichu-dup-at]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.gaichuDupAt);
          const src = JSON.parse(JSON.stringify(STATE.draft.外注[idx]));
          STATE.draft.外注.splice(idx + 1, 0, src);
          renderJobs();
        });
      });
      // 外注選択肢の削除（複数選択肢が残る場合のみ）
      wsEl.querySelectorAll('[data-gopt-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const [gIdx, oIdx] = btn.dataset.goptRemove.split('.').map(Number);
          STATE.draft.外注[gIdx].選択肢.splice(oIdx, 1);
          renderJobs();
        });
      });

      // ===== 相見積セクション（外注ユニット単位） =====

      // 外注ユニット i の相見積データを確保するヘルパー
      function ensureAimitsuUnit(unitIdx) {
        const unit = STATE.draft.外注?.[unitIdx];
        if (!unit) return [];
        if (!unit.相見積もり) unit.相見積もり = [];
        return unit.相見積もり;
      }

      // 各セル入力（data-aimitsu="unitIdx.rowIdx.field"）
      wsEl.querySelectorAll('[data-aimitsu]').forEach(el => {
        el.addEventListener('input', () => {
          const [uIdx, rIdx, field] = el.dataset.aimitsu.split('.');
          const rows = ensureAimitsuUnit(parseInt(uIdx));
          let v = el.value;
          if (field === '仕込額') v = v === '' ? null : Number(v);
          if (rows[parseInt(rIdx)]) rows[parseInt(rIdx)][field] = v;
        });
      });

      // 採用チェックボックス（ラジオ動作: ユニット内で1社のみ）
      // data-aimitsu-adopt="unitIdx.rowIdx"
      wsEl.querySelectorAll('[data-aimitsu-adopt]').forEach(cb => {
        cb.addEventListener('change', () => {
          const [uIdx, rIdx] = cb.dataset.aimitsuAdopt.split('.').map(Number);
          const rows = ensureAimitsuUnit(uIdx);
          rows.forEach((r, i) => { r.採用 = (i === rIdx && cb.checked); });
          // 採用会社を発注先に自動セット＆仕込額を外注に即反映
          const unit = STATE.draft.外注[uIdx];
          if (unit) {
            const adopted = cb.checked ? rows[rIdx] : null;
            unit.発注先 = adopted ? adopted.会社 : (rows.find(r => r.採用)?.会社 || '');
            const opt = unit.選択肢?.[0];
            if (opt && adopted && adopted.仕込額 != null) {
              opt.仕込経費 = adopted.仕込額;
              // 掛率があれば 仕込 × 掛率 = 請求額、なければ仕込額をそのまま請求
              opt.請求額 = (opt.掛率 != null)
                ? Math.round(adopted.仕込額 * opt.掛率)
                : adopted.仕込額;
              const qty = parseFloat(String(opt.数量 ?? '').replace(/[^\d.]/g, ''));
              if (qty) opt.単価 = Math.round(opt.請求額 / qty * 10) / 10;
            }
          }
          // 同ユニット内の他チェックを外す
          const section = cb.closest('[data-aimitsu-unit]');
          if (section) {
            section.querySelectorAll('[data-aimitsu-adopt]').forEach((c, i) => {
              c.checked = (i === rIdx && cb.checked);
            });
            section.querySelectorAll('.aimitsumori-grid .ai-row:not(.ai-header)').forEach((tr, i) => {
              tr.classList.toggle('ai-selected', i === rIdx && cb.checked);
            });
          }
          renderJobsKeepFocus();
        });
      });

      // JSON 取込パネルのトグル（ユニットごと）
      wsEl.querySelectorAll('[data-act-aimitsu="toggle-import"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.aimitsuIdx;
          const panel = wsEl.querySelector(`[data-aimitsu-import-panel="${idx}"]`);
          if (panel) panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
        });
      });

      // JSON 取込実行（ユニットごと）
      wsEl.querySelectorAll('[data-act-aimitsu="import-json"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const ta = wsEl.querySelector(`[data-aimitsu-json="${uIdx}"]`);
          if (!ta) return;
          try {
            const parsed = JSON.parse(ta.value.trim());
            const results = parsed['相見積もり結果'] || parsed['results'] || (Array.isArray(parsed) ? parsed : null);
            if (!results) throw new Error('相見積もり結果 キーが見つかりません');
            const rows = ensureAimitsuUnit(uIdx);
            results.forEach(r => {
              if (!r.会社) return;
              let target = rows.find(row => row.会社 === r.会社);
              if (!target) {
                // グリッドにない会社は新規行として追加
                target = { 会社: r.会社, 適合: '', 仕込額: null, 備考: '', 採用: false };
                rows.push(target);
              }
              if (r.仕込額 !== undefined) target.仕込額 = r.仕込額;
              if (r.適合 !== undefined) target.適合 = r.適合;
              if (r.納期 !== undefined) target.納期 = r.納期;
              if (r.備考 !== undefined) target.備考 = r.備考;
              if (r.URL)               target.URL   = r.URL;
            });
            ta.value = '';
            renderJobs();
            const toast = wsEl.querySelector(`[data-aimitsu-toast="${uIdx}"]`);
            if (toast) { toast.textContent = '取込完了'; setTimeout(() => { toast.textContent = ''; }, 3000); }
          } catch(e) {
            alert('JSON の解析に失敗しました: ' + e.message);
          }
        });
      });

      // Claude に依頼: 仕様入り依頼文をクリップボードにコピー（ユニットごと）
      wsEl.querySelectorAll('[data-act-aimitsu="copy-prompt"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const j = STATE.draft || jobOrig;
          const spec = j.外注?.[uIdx]?.選択肢?.[0] || {};
          const specLines = [
            spec.サイズ && `  サイズ: ${spec.サイズ}`,
            spec.数量  && `  数量:   ${spec.数量}`,
            spec.加工  && `  加工:   ${spec.加工}`,
            spec.用紙  && `  用紙:   ${spec.用紙}`,
          ].filter(Boolean).join('\n');
          // グリッドにある会社リストを動的に取得（なければ AIMITSU_COS をデフォルト）
          const unitRows = j.外注?.[uIdx]?.相見積もり;
          const coList = (unitRows && unitRows.length > 0)
            ? unitRows.map(r => r.会社).filter(Boolean)
            : [...AIMITSU_COS];
          const coListLine = coList.join('・');
          const cat = detectPrintCategory(spec, j.製品名);
          const urlMap = AIMITSU_URL_TABLE[cat] || AIMITSU_URL_TABLE['デフォルト'];
          const jsonTemplate = coList.map(c => {
            const url = urlMap[c] || '';
            return `  {"会社":"${c}","適合":"○△×のいずれか","仕込額":null,"URL":"${url}","備考":""}`;
          }).join(',\n');
          const prompt =
`【相見積もり依頼】— IDEARNEST WORKSHEET より

■ 案件: ${j.製品名 || ''}（${j.クライアント || ''}）
■ 仕様:
${specLines || '  （外注仕様欄を記入してください）'}

上記仕様で ${coListLine} の相見積もりをお願いします。
仕様に合わない会社は適合を「×」としてください。
上記以外にも安く印刷できそうな会社があれば追加してもらって構いません。

収集後、結果を以下の JSON 形式で出力してください:
{"相見積もり結果":[
${jsonTemplate}
]}`;
          navigator.clipboard.writeText(prompt).then(() => {
            btn.textContent = 'コピー済み';
            setTimeout(() => { btn.textContent = 'Claude に依頼'; }, 3000);
            const toast = wsEl.querySelector(`[data-aimitsu-toast="${uIdx}"]`);
            if (toast) { toast.textContent = 'クリップボードにコピーしました'; setTimeout(() => { toast.textContent = ''; }, 3000); }
          });
        });
      });

      // 外注に反映: 採用チェック会社の仕込額を同ユニットの外注選択肢に書き込む
      wsEl.querySelectorAll('[data-act-aimitsu="apply"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const rows = ensureAimitsuUnit(uIdx);
          const adopted = rows.find(r => r.採用);
          if (!adopted) { alert('採用する会社にチェックを入れてください。'); return; }
          const unit = STATE.draft.外注?.[uIdx];
          const opt = unit?.選択肢?.[0];
          if (!opt) { alert('外注の選択肢がありません。'); return; }
          opt.仕込経費 = adopted.仕込額;
          opt.請求額 = (opt.掛率 != null)
            ? Math.round(adopted.仕込額 * opt.掛率)
            : adopted.仕込額;
          const qty = parseFloat(String(opt.数量 ?? '').replace(/[^\d.]/g, ''));
          if (adopted.仕込額 != null && qty) opt.単価 = Math.round(opt.請求額 / qty * 10) / 10;
          // 採用会社を発注先に設定（空の場合のみ）
          if (!unit.発注先) unit.発注先 = adopted.会社;
          const toast = wsEl.querySelector(`[data-aimitsu-toast="${uIdx}"]`);
          if (toast) { toast.textContent = `${adopted.会社} を反映しました`; setTimeout(() => { toast.textContent = ''; }, 4000); }
          renderJobs();
        });
      });

      // 相見積行削除（data-aimitsu-remove="unitIdx.rowIdx"）
      wsEl.querySelectorAll('[data-aimitsu-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const [uIdx, rIdx] = btn.dataset.aimitsuRemove.split('.').map(Number);
          const unit = STATE.draft.外注?.[uIdx];
          if (unit && unit.相見積もり) {
            unit.相見積もり.splice(rIdx, 1);
            renderJobsKeepFocus();
          }
        });
      });

      // 相見積行追加（data-act-aimitsu="add-row"）
      wsEl.querySelectorAll('[data-act-aimitsu="add-row"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const unit = STATE.draft.外注?.[uIdx];
          if (unit) {
            if (!unit.相見積もり) unit.相見積もり = [];
            unit.相見積もり.push({ 会社: '', 適合: '', 仕込額: null, 備考: '', 採用: false });
            renderJobsKeepFocus();
          }
        });
      });

      // 相見積セクションを追加（タイトル横「追加」ボタン）
      wsEl.querySelectorAll('[data-act-aimitsu="add-aimitsu"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const unit = STATE.draft.外注?.[uIdx];
          if (unit) {
            // 印刷物は5社プリセット、その他は空行1つ
            unit.相見積もり = STATE.draft.媒体 === '印刷物'
              ? AIMITSU_COS.map(c => ({ 会社: c, 適合: '', 仕込額: null, 備考: '', 採用: false }))
              : [{ 会社: '', 適合: '', 仕込額: null, 備考: '', 採用: false }];
            renderJobsKeepFocus();
          }
        });
      });

      // 相見積セクションを削除（タイトル横「削除」ボタン）
      wsEl.querySelectorAll('[data-act-aimitsu="remove-aimitsu"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const uIdx = parseInt(btn.dataset.aimitsuIdx);
          const unit = STATE.draft.外注?.[uIdx];
          if (unit) {
            unit.相見積もり = null;
            renderJobsKeepFocus();
          }
        });
      });
    }
  }

  async function handleSave(jobOrig) {
    try {
      const r = await fetch('/api/save', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(STATE.draft),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'failed');

      // Reload data.js
      const newScript = await fetch('data.js?_=' + Date.now()).then(r => r.text());
      const fn = new Function(newScript + '; return window.IDEARNEST;');
      window.IDEARNEST = fn();
      Object.assign(D, window.IDEARNEST);

      STATE.editingKey = null;
      STATE.draft = null;
      STATE.isNewJob = false;
      renderStats();
      renderPills();
      renderJobs();
      showToast('保存しました');
    } catch (e) {
      showToast('保存失敗: ' + e.message, 'error');
    }
  }

      入稿予定日: null,
      納品予定日: null,
      納品日: null,
      請求月: null,
      請求締日: '月末',
      担当: '',
      サイズ: '',
      数量: null,
      色数: '',
      加工: '',
      用紙: '',
      明細: [],
      外注: [],

      内訳_社内のみ: [],

    phone:            '電話（録音なし）',
    phone_recorded:   '電話（録音）',
    meeting:          '打ち合わせ（録音なし）',
    meeting_recorded: '打ち合わせ（録音）',
    manual:           '手入力',
  };
  const SOURCE_COLOR = {
    line:             { bg: '#d4f0d4', fg: '#1a6b1a' },
    email:            { bg: '#d4e6ff', fg: '#1a3a7a' },
    phone:            { bg: '#fde8cc', fg: '#7a3a00' },
    phone_recorded:   { bg: '#ead5f5', fg: '#5a007a' },
    meeting:          { bg: '#e8e8e8', fg: '#444'    },
    meeting_recorded: { bg: '#d5c5f5', fg: '#3a006a' },
    audio:            { bg: '#ead5f5', fg: '#5a007a' }, // fallback
    manual:           { bg: '#f0f0f0', fg: '#666'    },
  };
  // source_typeとsource_metaから表示用ラベルとカラーキーを返す
  function sourceInfo(src, meta) {
    if (src === 'audio') {
      const fn = ((meta || {}).audio_filename) || '';
      const isPhone = /通話|voicemail|voice/i.test(fn);
      return isPhone
        ? { label: '電話（録音）',      key: 'phone_recorded'   }
        : { label: '打ち合わせ（録音）', key: 'meeting_recorded' };
    }
    return { label: SOURCE_LABEL[src] || src || '?', key: src };
  }
  function sourceBadge(src, meta) {
    const info = sourceInfo(src, meta);
    const c = SOURCE_COLOR[info.key] || { bg: '#eee', fg: '#555' };
    return `<span style="display:inline-block; min-width:36px; padding:1px 6px; font-size:10px; font-weight:700; text-align:center; background:${c.bg}; color:${c.fg}; border-radius:3px; white-space:nowrap;">${escapeHtml(info.label)}</span>`;
  }

  function getMinutes() {
    return D.minutes || [];
  }
  function getMinutesByJob(jobNo) {
    if (!jobNo) return [];
    const norm = s => String(s || '').replace(/^#/, '').trim();
    return getMinutes().filter(m => norm(m.job_no) === norm(jobNo));
  }
  function getMinutesByClient(clientId) {
    if (!clientId) return [];
    return getMinutes().filter(m => (m.client_id || '') === clientId);
  }

  function renderMinutes() {
    const list = $('#minutes-list');
    const summary = $('#minutes-summary');
    const minutes = getMinutes();

    // クライアントフィルタの選択肢を再構築
    const filterClient = $('#minutes-filter-client');
    const currentVal = filterClient.value;
    const usedClients = [...new Set(minutes.map(m => m.client_id).filter(Boolean))].sort();
    filterClient.innerHTML = '<option value="">クライアント：全て</option>' +
      usedClients.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    filterClient.value = currentVal;

    const q = ($('#minutes-search').value || '').trim().toLowerCase();
    const fc = filterClient.value;
    const fs = $('#minutes-filter-source').value;

    const filtered = minutes.filter(m => {
      if (fc && m.client_id !== fc) return false;
      if (fs && m.source_type !== fs) return false;
      if (q) {
        const blob = [
          m.title, m.summary, m.client_id, m.job_no,
          ...(m.tags || []),
          ...(m.decisions || []).map(x => x.text),
          ...(m.new_requests || []).map(x => x.text),
          ...(m.modifications || []).map(x => x.text),
        ].filter(Boolean).join(' ').toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:var(--ink-3); padding:60px 20px; background:var(--card-bg); border:1px dashed var(--line); border-radius:6px;">議事録なし<br><span style="font-size:11px;">右上の「＋ 議事録追加」から追加できます</span></div>';
      summary.textContent = '';
      return;
    }

    list.innerHTML = filtered.map(m => {
      const counts = [];
      const dCount = (m.decisions || []).length;
      const nCount = (m.new_requests || []).length;
      const mCount = (m.modifications || []).length;
      const sCount = (m.schedules || []).length;
      const aCount = (m.next_actions || []).length;
      counts.push(`<span class="${dCount?'has':''}">決定 ${dCount}</span>`);
      counts.push(`<span class="${nCount?'has':''}">新規 ${nCount}</span>`);
      counts.push(`<span class="${mCount?'has':''}">修正 ${mCount}</span>`);
      counts.push(`<span class="${sCount?'has':''}">予定 ${sCount}</span>`);
      counts.push(`<span class="${aCount?'has':''}">アクション ${aCount}</span>`);
      const isApplied = !!(m.applied && m.applied.applied_at);
      if (isApplied) counts.push('<span class="applied">反映済</span>');

      const jobNoDisp = m.job_no ? `#${escapeHtml(m.job_no)}` : 'NEW';
      const jobClass = m.job_no ? '' : 'is-new';

      const isProcessing = (m.status === 'processing_transcribe' || m.status === 'processing_digest');
      const isError = (m.status === 'error');
      const statusBanner = isProcessing
        ? `<div style="font-size:11px; color:var(--color-coral); padding:4px 8px; background:#fff7e0; border-radius:3px; margin-bottom:6px;">処理中：${escapeHtml(m.status_message || '')}</div>`
        : (isError ? `<div style="font-size:11px; color:var(--danger); padding:4px 8px; background:#fdf0e6; border-radius:3px; margin-bottom:6px;">エラー：${escapeHtml(m.status_message || '')}</div>` : '');

      return `<div class="minute-card" data-mid="${escapeHtml(m.id)}">
        <div class="minute-card-head">
          ${sourceBadge(m.source_type, m.source_meta)}
          <span class="minute-datetime">${escapeHtml(m.date || '')} ${escapeHtml(m.time || '')}</span>
          <span class="minute-client">${escapeHtml(m.client_id || '?')}</span>
          <span class="minute-job-no ${jobClass}">${jobNoDisp}</span>
        </div>
        ${statusBanner}
        <div class="minute-card-title">${escapeHtml(m.title || '(無題)')}</div>
        <div class="minute-card-summary">${escapeHtml((m.summary || '').slice(0, 200))}</div>
        <div class="minute-card-counts">${counts.join('')}</div>
      </div>`;
    }).join('');

    summary.textContent = `${filtered.length} / ${minutes.length} 件`;

    // クリックイベント
    list.querySelectorAll('.minute-card').forEach(card => {
      card.addEventListener('click', () => openMinuteDetail(card.dataset.mid));
    });
  }

  // 検索・フィルタのイベント
  ['minutes-search', 'minutes-filter-client', 'minutes-filter-source'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderMinutes);
    document.getElementById(id).addEventListener('change', renderMinutes);
  });

  // ====== MINUTE MODAL ======
  function closeMinuteModal() {
    $('#minute-modal').classList.remove('show');
  }
  $('#minute-modal-close').addEventListener('click', closeMinuteModal);
  $('#minute-modal').addEventListener('click', (e) => {
    if (e.target.id === 'minute-modal') closeMinuteModal();
  });

  $('#btn-add-minute').addEventListener('click', () => openMinuteAdd());

  function openMinuteAdd() {
    const modal = $('#minute-modal');
    $('#minute-modal-title').textContent = '＋ 議事録追加';

    const today = new Date().toISOString().slice(0, 10);
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const time = `${hh}:${mm}`;

    const clients = (D.clients || []).map(c => c.id || c.社名).filter(Boolean);
    const clientOpts = ['<option value="">（未選択）</option>',
      ...clients.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`)].join('');

    const activeJobs = (D.jobs || [])
      .filter(j => j.状態 !== '完了' && j.状態 !== '中止' && j.制作番号)
      .sort((a, b) => (b.制作番号 || 0) - (a.制作番号 || 0));
    const jobOpts = ['<option value="">（新規 / 未確定）</option>',
      ...activeJobs.map(j => `<option value="${j.制作番号}">#${j.制作番号} ${escapeHtml(j.クライアント || '')} / ${escapeHtml(j.製品名 || '')}</option>`)].join('');

    $('#minute-modal-body').innerHTML = `
      <div class="source-picker" id="source-picker">
        <button type="button" class="source-btn active" data-src="audio">
          <span><span class="label">録音ファイル</span><span class="desc">m4a/mp3/wav等をドロップ → 文字起こし→議事録化</span></span>
        </button>
        <button type="button" class="source-btn" data-src="manual">
          <span><span class="label">直接入力</span><span class="desc">タイトル・本文を手で書く</span></span>
        </button>
        <button type="button" class="source-btn" data-src="email">
          <span><span class="label">メール本文を貼り付け</span><span class="desc">AIが議事録化</span></span>
        </button>
        <button type="button" class="source-btn" data-src="line">
          <span><span class="label">LINE/チャットを貼り付け</span><span class="desc">AIが議事録化</span></span>
        </button>
        <button type="button" class="source-btn" data-src="phone">
          <span><span class="label">電話メモから議事録化</span><span class="desc">メモを書いてAIが整理</span></span>
        </button>
      </div>

      <div class="form-row">
        <label>日付</label>
        <input type="date" id="m-date" value="${today}">
        <input type="time" id="m-time" value="${time}" style="max-width:120px;">
      </div>
      <div class="form-row">
        <label>クライアント</label>
        <select id="m-client">${clientOpts}</select>
      </div>
      <div class="form-row">
        <label>関連案件</label>
        <select id="m-job">${jobOpts}</select>
      </div>

      <!-- 直接入力モード用 -->
      <div id="manual-fields">
        <div class="form-row">
          <label>タイトル</label>
          <input type="text" id="m-title" placeholder="例：発送遅延の連絡">
        </div>
        <div class="form-row" style="align-items:flex-start;">
          <label>議事録本文</label>
          <textarea id="m-note" placeholder="決定事項・次のアクション・スケジュール等を自由に記述"></textarea>
        </div>
      </div>

      <!-- AI処理モード用 -->
      <div id="ai-fields" style="display:none;">
        <div class="form-row" id="email-from-row" style="display:none;">
          <label>送信者</label>
          <input type="text" id="m-email-from" placeholder="例：山田様（◯◯商店）">
        </div>
        <div class="form-row" id="email-subject-row" style="display:none;">
          <label>件名</label>
          <input type="text" id="m-email-subject" placeholder="メール件名">
        </div>
        <div class="form-row" style="align-items:flex-start;">
          <label id="ai-input-label">本文</label>
          <textarea id="m-raw" placeholder="メール本文 / チャットログ / 電話メモを貼り付け"></textarea>
        </div>
        <div style="font-size:11px; color:var(--ink-3); padding-left:100px; margin-top:-4px;">
          AIが決定事項・新規依頼・修正・スケジュール・次のアクションに自動分類します
        </div>
      </div>

      <!-- 音声モード用 -->
      <div id="audio-fields">
        <div id="audio-dropzone" style="border:2px dashed var(--line-2); border-radius:8px; padding:32px 20px; text-align:center; cursor:pointer; background:var(--bg); transition:all 0.15s;">
          <div style="font-size:14px; font-weight:600; color:var(--ink); margin-bottom:6px;">録音ファイルをここにドロップ</div>
          <div style="font-size:12px; color:var(--ink-3); margin-bottom:12px;">m4a / mp3 / wav / ogg / mp4 等ほぼ全フォーマット対応</div>
          <button type="button" id="m-audio-pick" style="padding:7px 18px; border:1px solid var(--line); border-radius:4px; background:var(--card-bg); cursor:pointer; font-family:inherit; font-size:12px;">ファイルを選択...</button>
          <input type="file" id="m-audio-file" accept="audio/*,video/mp4,video/quicktime,.m4a,.mp3,.wav,.ogg,.flac" style="display:none;">
          <div id="audio-selected-info" style="margin-top:12px; font-size:12px; color:var(--ink-2); display:none;"></div>

        <div style="font-size:11px; color:var(--ink-3); margin-top:10px; line-height:1.6;">
          アップロード後、文字起こし（ローカル whisper.cpp）→ AI議事録化が自動で走ります。<br>
          処理時間目安：5分音声で約8〜10分／30分音声で約50分。バックグラウンド実行されるので、画面を閉じてもOK。
